<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="theme-color" content="#040507"><title>OKX FLOW PRO</title><style>:root{--g:#00e676;--g2:rgba(0,230,118,.12);--g3:rgba(0,230,118,.22);--r:#ff3d5a;--r2:rgba(255,61,90,.12);--r3:rgba(255,61,90,.22);--a:#ffab00;--a2:rgba(255,171,0,.12);--pu:#b388ff;--pu2:rgba(179,136,255,.12);--bg0:#040507;--bg1:#080a0f;--bg2:#0e1219;--bg4:#1a2030;--b0:rgba(255,255,255,.05);--b1:rgba(255,255,255,.10);--t0:#dde1ee;--t1:#8b95aa;--t2:#4a5470}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:var(--bg0);color:var(--t0);font-family:monospace;min-height:100dvh}::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bg4)}.hdr{position:sticky;top:0;z-index:200;background:rgba(4,5,7,.97);backdrop-filter:blur(16px);border-bottom:.5px solid var(--b0);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}.logo{font-size:13px;font-weight:700;letter-spacing:.12em}.logo em{color:var(--g);font-style:normal}.hdr-r{display:flex;align-items:center;gap:6px}.pill{font-size:9px;padding:3px 8px;border-radius:2px;font-weight:500}.plive{background:var(--g2);color:var(--g);border:.5px solid var(--g3)}.pload{background:var(--a2);color:var(--a);border:.5px solid rgba(255,171,0,.3)}.perr{background:var(--r2);color:var(--r)}.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:currentColor;margin-right:3px;animation:blink 1.5s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}.rbtn{font-size:9px;padding:4px 9px;border:.5px solid var(--b1);border-radius:2px;background:transparent;color:var(--t1);cursor:pointer}#clk{font-size:9px;color:var(--t2)}.wrap{padding:10px 12px 60px;max-width:600px;margin:0 auto}.sumgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px}.sm{background:var(--bg2);border:.5px solid var(--b0);border-left:2px solid transparent;border-radius:3px;padding:8px 10px}.sm.g{border-left-color:var(--g)}.sm.r{border-left-color:var(--r)}.sm.a{border-left-color:var(--a)}.sm.p{border-left-color:var(--pu)}.sm-l{font-size:8px;color:var(--t2);text-transform:uppercase;margin-bottom:3px;letter-spacing:.05em}.sm-v{font-size:18px;font-weight:700;line-height:1;margin-bottom:2px}.sm-s{font-size:9px;color:var(--t2)}.cg{color:var(--g)}.cr{color:var(--r)}.ca{color:var(--a)}.cp{color:var(--pu)}.sec{font-size:8px;color:var(--t2);letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin:12px 0 7px}.sec::after{content:'';flex:1;height:.5px;background:var(--b0)}.tabs{display:flex;gap:3px;margin-bottom:7px;overflow-x:auto;-webkit-overflow-scrolling:touch}.tab{font-size:9px;padding:4px 10px;border:.5px solid var(--b0);border-radius:2px;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap}.tab.on{background:var(--g);color:#001a0e;font-weight:700}.tab.ron.on{background:var(--r);color:#fff}.srch{width:100%;margin-bottom:7px;font-size:11px;padding:6px 10px;background:var(--bg2);border:.5px solid var(--b0);border-radius:2px;color:var(--t0);outline:none}.srch::placeholder{color:var(--t2)}.list{display:flex;flex-direction:column;gap:6px}.cc{background:var(--bg2);border:.5px solid var(--b0);border-radius:5px;padding:10px 12px;border-left:3px solid transparent}.cc.long{border-left-color:var(--g)}.cc.short{border-left-color:var(--r)}.cc.hot{background:rgba(0,230,118,.03)}.r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.r1-left{display:flex;align-items:center;gap:6px}.csym{font-size:15px;font-weight:700}.cprice{font-size:14px;font-weight:600}.htag{font-size:7px;padding:1px 4px;background:var(--g2);color:var(--g);border-radius:1px}.otag{font-size:7px;padding:1px 4px;background:var(--a2);color:var(--a);border-radius:1px}.stag{font-size:7px;padding:1px 4px;background:var(--pu2);color:var(--pu);border-radius:1px}.r2{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:7px}.dl{font-size:7px;color:var(--t2);margin-bottom:1px}.dv{font-size:10px;font-weight:600}.frbar{width:100%;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin-top:2px}.ff{height:100%}.ratbar{width:100%;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;display:flex;margin-top:2px}.rbl{height:100%;background:var(--g)}.rbs{height:100%;background:var(--r)}.r3{background:rgba(0,0,0,.25);border-radius:3px;padding:6px 8px;display:flex;flex-direction:column;gap:3px;margin-bottom:6px}.rrow{display:flex;align-items:flex-start;gap:4px}.rlbl{font-size:7px;color:var(--t2);width:40px;flex-shrink:0;padding-top:1px}.rtag{font-size:7px;font-weight:700;padding:1px 4px;border-radius:1px;flex-shrink:0}.rt-g{background:rgba(0,230,118,.2);color:#00a84a}.rt-r{background:rgba(255,61,90,.2);color:#cc2040}.rt-a{background:rgba(255,171,0,.18);color:#b87800}.rt-d{background:rgba(255,255,255,.06);color:var(--t2)}.rdesc{font-size:7px;color:var(--t1);flex:1;line-height:1.4}.vegas-box{border:.5px solid var(--b0);border-radius:3px;padding:6px 8px;margin-bottom:6px}.vegas-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}.vegas-label{font-size:8px;color:var(--t2);letter-spacing:.05em}.vegas-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px}.vb-sb{background:rgba(0,230,118,.25);color:#00e676}.vb-b{background:rgba(0,230,118,.15);color:#00e676}.vb-mb{background:rgba(0,230,118,.08);color:#69f0ae}.vb-n{background:rgba(255,255,255,.05);color:var(--t2)}.vb-ms{background:rgba(255,61,90,.08);color:#ff8a9a}.vb-s{background:rgba(255,61,90,.15);color:#ff3d5a}.vb-ss{background:rgba(255,61,90,.25);color:#ff3d5a}.vegas-detail{font-size:8px;color:var(--t1)}.vegas-ema{font-size:7px;color:var(--t2);margin-top:2px}.r4{display:flex;align-items:center;justify-content:space-between;padding-top:6px;border-top:.5px solid var(--b0)}.r4-left{display:flex;align-items:center;gap:6px}.sig{font-size:9px;font-weight:700;padding:3px 8px;border-radius:2px}.sl{background:rgba(0,230,118,.14);color:var(--g)}.ss{background:rgba(255,61,90,.14);color:var(--r)}.sn{background:rgba(255,255,255,.05);color:var(--t2)}.sigtime{font-size:8px;color:var(--t2)}.r4-right{display:flex;align-items:center;gap:4px}.scnum{font-size:20px;font-weight:700}.fr-next{font-size:7px;color:var(--t2);margin-top:1px}.oi-anom{font-size:7px;color:var(--a)}.larea{text-align:center;padding:40px 16px}.lbar{width:180px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin:10px auto}.lfill{height:100%;background:var(--g);animation:prog 1.6s ease-in-out infinite}@keyframes prog{0%{width:0%;margin-left:0}50%{width:55%;margin-left:22%}100%{width:0%;margin-left:100%}}.lmsg{font-size:10px;color:var(--t2);margin-top:6px}.sbar{position:fixed;bottom:0;left:0;right:0;background:rgba(4,5,7,.95);border-top:.5px solid var(--b0);padding:6px 14px;display:flex;justify-content:space-between;font-size:8px;color:var(--t2)}</style></head><body>
<header class="hdr"><div class="logo">OKX <em>FLOW</em></div><div class="hdr-r"><span id="stpill" class="pill pload"><span class="dot"></span>連接中</span><span id="clk">--:--</span><button class="rbtn" onclick="load(true)">↻</button></div></header>
<div class="wrap">
<div class="sumgrid" id="sum"><div class="sm g"><div class="sm-l">載入中</div><div class="sm-v" style="color:var(--t2)">---</div></div><div class="sm r"><div class="sm-l">請稍候</div><div class="sm-v" style="color:var(--t2)">---</div></div></div>
<div class="sec">全部 USDT 永續合約</div>
<div class="tabs"><button class="tab on" onclick="setTab('all',this)">全部</button><button class="tab" onclick="setTab('long',this)">做多</button><button class="tab ron" onclick="setTab('short',this)">做空</button><button class="tab" onclick="setTab('hot',this)">🔥強烈</button><button class="tab" onclick="setTab('fr+',this)">高FR</button><button class="tab" onclick="setTab('oia',this)">OI異常</button><button class="tab" onclick="setTab('vegas',this)">Vegas突破</button></div>
<input class="srch" id="srch" placeholder="搜尋幣種..." oninput="apply()">
<div class="list" id="list"><div class="larea"><div style="font-size:12px;color:var(--t1)">⬡ OKX FLOW PRO</div><div class="lbar"><div class="lfill"></div></div><div class="lmsg">正在拉取即時數據...</div></div></div>
</div>
<div class="sbar"><span>OKX 公開 API · 資金費率/OI真實數據</span><span id="lupd">--</span><span id="lcnt">--</span></div>
<script>
let ALL=[],curTab='all',autoT=null;
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})},1000);
const fp=p=>{if(!p||isNaN(p))return'--';const n=+p;if(n>10000)return'$'+n.toLocaleString('en',{maximumFractionDigits:0});if(n>1000)return'$'+n.toLocaleString('en',{maximumFractionDigits:1});if(n>100)return'$'+n.toFixed(2);if(n>10)return'$'+n.toFixed(3);if(n>1)return'$'+n.toFixed(4);if(n>0.01)return'$'+n.toFixed(5);return'$'+n.toFixed(7)};
const fc=c=>(+c>=0?'+':'')+parseFloat(c).toFixed(2)+'%';
const ffr=v=>{const p=(+v*100).toFixed(4);return(+p>=0?'+':'')+p+'%'};
const SC=s=>+s>=85?'#00e676':+s>=72?'#69f0ae':+s>=60?'#b9f6ca':+s>=45?'#ffab00':+s>=35?'#ff7043':'#ff3d5a';
function vegasBadgeClass(vs){return vs==='strong-bull'?'vb-sb':vs==='bull'?'vb-b':vs==='mild-bull'?'vb-mb':vs==='mild-bear'?'vb-ms':vs==='bear'?'vb-s':vs==='strong-bear'?'vb-ss':'vb-n'}
function reasons(c){
  const R=[];
  const chg=+c.chg24h,fr=+c.frVal,wl=+c.whaleLong,rl=+c.retailLong,oi=+c.oiChangePct;
  if(chg>6)R.push({l:'市場動能',t:'強勢看漲',cl:'rt-g',d:'強勢上漲 '+fc(chg)});
  else if(chg>2)R.push({l:'市場動能',t:'看漲',cl:'rt-g',d:'上漲 '+fc(chg)});
  else if(chg<-6)R.push({l:'市場動能',t:'強勢看跌',cl:'rt-r',d:'大幅下跌 '+fc(chg)});
  else if(chg<-2)R.push({l:'市場動能',t:'看跌',cl:'rt-r',d:'下跌 '+fc(chg)});
  else R.push({l:'市場動能',t:'方向不明',cl:'rt-a',d:'震盪 '+fc(chg)+'，等待方向'});
  if(fr>0.005)R.push({l:'資金費率',t:'偏多',cl:'rt-g',d:ffr(fr)+' 多方積極付費'+(c.frAnomaly?' ⚠異常':'')});
  else if(fr<-0.005)R.push({l:'資金費率',t:'偏空',cl:'rt-r',d:ffr(fr)+' 空方付費'+(c.frAnomaly?' ⚠異常':'')});
  else R.push({l:'資金費率',t:'中性',cl:'rt-a',d:'費率'+ffr(fr)+'，情緒中性'});
  if(c.hasLSData){
    if(wl>62)R.push({l:'大戶動向',t:'大戶偏多',cl:'rt-g',d:'大戶多頭 '+wl+'%，跟隨大戶'});
    else if(wl<40)R.push({l:'大戶動向',t:'大戶偏空',cl:'rt-r',d:'大戶空頭 '+(100-wl)+'%，謹慎'});
    else R.push({l:'大戶動向',t:'均衡',cl:'rt-d',d:'大戶持倉均衡 '+wl+'% vs '+(100-wl)+'%'});
    if(rl<38)R.push({l:'散戶倉鼠',t:'散戶偏空',cl:'rt-g',d:'散戶空 '+(100-rl)+'%，反向做多機會'});
    else if(rl>62)R.push({l:'散戶倉鼠',t:'散戶偏多',cl:'rt-r',d:'散戶多 '+rl+'%，反向警惕'});
    else R.push({l:'散戶倉鼠',t:'均衡',cl:'rt-d',d:'散戶多空均衡'});
  }else{
    R.push({l:'大戶動向',t:'無數據',cl:'rt-d',d:'OKX公開API無此幣多空比'});
  }
  if(oi>8)R.push({l:'OI持倉',t:'快速增倉',cl:'rt-g',d:'OI增加 +'+oi.toFixed(1)+'%，'+c.oiTrend+(c.oiAnomalyCount>=3?' ⚡異常':'')});
  else if(oi<-8)R.push({l:'OI持倉',t:'快速減倉',cl:'rt-r',d:'OI減少 '+oi.toFixed(1)+'%，'+c.oiTrend});
  else R.push({l:'OI持倉',t:c.oiTrend,cl:oi>0?'rt-g':oi<0?'rt-r':'rt-d',d:'OI變化 '+(oi>=0?'+':'')+oi.toFixed(1)+'%'});
  return R;
}
function renderSum(){
  const L=ALL.filter(c=>c.signal==='long').length;
  const S=ALL.filter(c=>c.signal==='short').length;
  const avgFR=ALL.reduce((s,c)=>s+(+c.frVal||0),0)/ALL.length;
  const avgWh=ALL.filter(c=>c.hasLSData).reduce((s,c)=>s+(+c.whaleLong||50),0)/(ALL.filter(c=>c.hasLSData).length||1);
  const top=ALL[0];const hots=ALL.filter(c=>c.isHot).length;
  const oiAnoms=ALL.filter(c=>(+c.oiAnomalyCount||0)>=3).length;
  const vegasBreak=ALL.filter(c=>c.vegasStrength==='bull'||c.vegasStrength==='strong-bull').length;
  document.getElementById('sum').innerHTML=
    '<div class="sm g"><div class="sm-l">做多信號</div><div class="sm-v cg">'+L+'</div><div class="sm-s">共'+ALL.length+'合約</div></div>'+
    '<div class="sm r"><div class="sm-l">做空信號</div><div class="sm-v cr">'+S+'</div><div class="sm-s">觀望'+(ALL.length-L-S)+'個</div></div>'+
    '<div class="sm '+(avgFR>0?'g':'r')+'"><div class="sm-l">市場平均FR</div><div class="sm-v '+(avgFR>0?'cg':'cr')+'">'+ffr(avgFR)+'</div><div class="sm-s">'+(avgFR>0.0003?'多方積極付費':avgFR<0?'空方付費':'費率接近零')+'</div></div>'+
    '<div class="sm a"><div class="sm-l">OI異常幣種</div><div class="sm-v ca">'+oiAnoms+'</div><div class="sm-s">持倉異常波動</div></div>'+
    '<div class="sm g"><div class="sm-l">Vegas突破</div><div class="sm-v cg">'+vegasBreak+'</div><div class="sm-s">突破上方幣種</div></div>'+
    '<div class="sm p"><div class="sm-l">強烈推薦</div><div class="sm-v cp">'+hots+'</div><div class="sm-s">評分≥78</div></div>';
}
function renderList(coins){
  const el=document.getElementById('list');
  if(!coins.length){el.innerHTML='<div style="text-align:center;padding:24px;font-size:10px;color:var(--t2)">沒有符合條件的合約</div>';return;}
  el.innerHTML=coins.map(c=>{
    const chg=+c.chg24h||0,fr=+c.frVal||0,wl=+c.whaleLong||50,rl=+c.retailLong||50,oi=+c.oiChangePct||0;
    const frBW=Math.min(100,Math.abs(fr/0.001)*100);
    const frBC=fr>0?'var(--g)':'var(--r)';
    const rs=reasons(c);
    const sig=c.signal==='long'?'<span class="sig sl">▲ 做多</span>':c.signal==='short'?'<span class="sig ss">▼ 做空</span>':'<span class="sig sn">— 觀望</span>';
    const vbc=vegasBadgeClass(c.vegasStrength||'neutral');
    const oiAnomHtml=(+c.oiAnomalyCount||0)>=3?'<span class="otag">OI⚡異常</span>':'';
    const frAnomHtml=c.frAnomaly?'<span class="stag">FR⚠</span>':'';
    return '<div class="cc '+c.signal+' '+(c.isHot?'hot':'')+'">'+
      '<div class="r1"><div class="r1-left"><span class="csym">'+c.sym+'</span>'+(c.isHot?'<span class="htag">HOT</span>':'')+oiAnomHtml+frAnomHtml+'</div><span class="cprice">'+fp(c.price)+'</span></div>'+
      '<div class="r2">'+
        '<div><div class="dl">24H漲跌</div><div class="dv '+(chg>=0?'cg':'cr')+'">'+fc(chg)+'</div></div>'+
        '<div><div class="dl">資金費率</div><div class="dv '+(fr>0?'cg':fr<0?'cr':'ca')+'">'+ffr(fr)+'</div><div class="frbar"><div class="ff" style="width:'+frBW+'%;background:'+frBC+'"></div></div><div class="fr-next">結算 '+c.nextFunding+'</div></div>'+
        '<div><div class="dl">OI變化</div><div class="dv '+(oi>=0?'cg':'cr')+'">'+(oi>=0?'+':'')+oi.toFixed(1)+'%</div>'+(oiAnomHtml?'<div class="oi-anom">⚡'+c.oiAnomalyCount+'次異常</div>':'<div class="oi-anom" style="color:var(--t2)">'+c.oiTrend+'</div>')+'</div>'+
        '<div><div class="dl">CVD買賣壓</div><div class="dv '+(c.cvdScore>55?'cg':c.cvdScore<45?'cr':'ca')+'">'+(c.cvdScore>55?'↑買壓':'↓賣壓')+' '+c.cvdScore+'</div></div>'+
      '</div>'+
      '<div class="r3">'+rs.map(r=>'<div class="rrow"><span class="rlbl">'+r.l+'</span><span class="rtag '+r.cl+'">'+r.t+'</span><span class="rdesc">'+r.d+'</span></div>').join('')+'</div>'+
      '<div class="vegas-box">'+
        '<div class="vegas-top"><span class="vegas-label">VEGAS 通道</span><span class="vegas-badge '+vbc+'">'+c.vegas+'</span></div>'+
        '<div class="vegas-detail">'+c.vegasDetail+'</div>'+
        '<div class="vegas-ema">EMA 144 / 169 / 576 / 676 · 訊號時間 '+c.signalTime+'</div>'+
      '</div>'+
      '<div class="r4">'+
        '<div class="r4-left">'+sig+'<span class="sigtime">'+c.signalTime+'</span></div>'+
        '<div class="r4-right"><span style="font-size:8px;color:var(--t2)">評分</span><span class="scnum" style="color:'+SC(c.score)+'">'+c.score+'</span></div>'+
      '</div>'+
    '</div>';
  }).join('');
}
function setTab(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curTab=t;apply();}
function apply(){
  const q=document.getElementById('srch').value.toUpperCase().trim();
  let list=ALL.filter(c=>{
    if(q&&!c.sym.toUpperCase().includes(q))return false;
    if(curTab==='long')return c.signal==='long';
    if(curTab==='short')return c.signal==='short';
    if(curTab==='hot')return c.isHot;
    if(curTab==='fr+')return(+c.frVal||0)>0.0005;
    if(curTab==='oia')return(+c.oiAnomalyCount||0)>=3;
    if(curTab==='vegas')return c.vegasStrength==='bull'||c.vegasStrength==='strong-bull';
    return true;
  });
  document.getElementById('lcnt').textContent=list.length+'個合約';
  renderList(list);
}
async function load(manual=false){
  const btn=document.querySelector('.rbtn');
  if(manual&&btn){btn.textContent='⏳';btn.disabled=true;}
  document.getElementById('stpill').className='pill pload';
  document.getElementById('stpill').innerHTML='<span class="dot"></span>更新中';
  try{
    const r=await fetch('/api/coins',{signal:AbortSignal.timeout(90000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!j.ok||!j.data||!j.data.length)throw new Error(j.error||'no data');
    ALL=j.data;
    renderSum();apply();
    document.getElementById('stpill').className='pill plive';
    document.getElementById('stpill').innerHTML='<span class="dot"></span>LIVE·'+ALL.length;
    document.getElementById('lupd').textContent='更新 '+j.updateTime;
    clearTimeout(autoT);autoT=setTimeout(()=>load(),60000);
  }catch(e){
    document.getElementById('stpill').className='pill perr';
    document.getElementById('stpill').textContent='⚠失敗';
    document.getElementById('list').innerHTML='<div style="text-align:center;padding:30px;font-size:10px;color:var(--t2)"><div style="color:var(--r);margin-bottom:8px">⚠ '+e.message+'</div><button onclick="load(true)" style="font-size:10px;padding:6px 14px;border:.5px solid var(--b1);border-radius:2px;background:transparent;color:var(--t0);cursor:pointer">↻ 重新載入</button></div>';
    clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
  }finally{if(manual&&btn){btn.textContent='↻';btn.disabled=false;}}
}
load();
</script></body></html>
