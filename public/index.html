<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#050608"><title>OKX FLOW PRO</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');:root{--g:#00ff88;--g2:rgba(0,255,136,.08);--g3:rgba(0,255,136,.18);--r:#ff3366;--r2:rgba(255,51,102,.08);--r3:rgba(255,51,102,.18);--a:#ffb800;--a2:rgba(255,184,0,.08);--a3:rgba(255,184,0,.18);--pu:#a855f7;--pu2:rgba(168,85,247,.08);--bg0:#050608;--bg1:#090b0f;--bg2:#0d1117;--bg3:#111620;--bg4:#161c28;--b0:rgba(255,255,255,.04);--b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);--t0:#e6edf3;--t1:#8b949e;--t2:#484f58;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html{font-size:13px}body{background:var(--bg0);color:var(--t0);font-family:var(--sans);min-height:100dvh}body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,255,136,.03) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(168,85,247,.03) 0%,transparent 60%);pointer-events:none}::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bg4)}.hdr{position:sticky;top:0;z-index:100;background:rgba(5,6,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--b0);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:8px}.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--g),#00ccff);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}.logo-text{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.08em}.logo-text span{color:var(--g)}.logo-badge{font-size:8px;padding:1px 5px;background:var(--g2);color:var(--g);border-radius:2px;border:1px solid var(--g3);letter-spacing:.06em;font-weight:600}.hdr-r{display:flex;align-items:center;gap:8px}.live-pill{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:3px;background:var(--g2);color:var(--g);border:1px solid var(--g3);font-weight:600}.pload{background:rgba(255,184,0,.08);color:var(--a);border:1px solid rgba(255,184,0,.2)}.perr{background:var(--r2);color:var(--r);border:1px solid var(--r3)}.live-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}.hdr-time{font-family:var(--mono);font-size:10px;color:var(--t2)}.hdr-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}.mktbar{background:var(--bg1);border-bottom:1px solid var(--b0);padding:0 14px;height:36px;display:flex;align-items:center;gap:20px;overflow-x:auto;-webkit-overflow-scrolling:touch}.mktbar::-webkit-scrollbar{display:none}.mi{display:flex;align-items:center;gap:6px;flex-shrink:0}.mi-label{font-size:9px;color:var(--t2);letter-spacing:.04em;text-transform:uppercase}.mi-val{font-family:var(--mono);font-size:10px;font-weight:600}.mi-sep{width:1px;height:16px;background:var(--b1);flex-shrink:0}.wrap{padding:12px 12px 70px;max-width:520px;margin:0 auto}.sum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}.sm{background:var(--bg2);border:1px solid var(--b0);border-radius:8px;padding:10px 12px;position:relative;overflow:hidden}.sm::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}.sm.g::before{background:linear-gradient(90deg,var(--g),transparent)}.sm.r::before{background:linear-gradient(90deg,var(--r),transparent)}.sm.a::before{background:linear-gradient(90deg,var(--a),transparent)}.sm.p::before{background:linear-gradient(90deg,var(--pu),transparent)}.sm-l{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.sm-v{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}.sm-s{font-size:8px;color:var(--t2)}.cg{color:var(--g)}.cr{color:var(--r)}.ca{color:var(--a)}.cp{color:var(--pu)}.tabs{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px;padding-bottom:2px}.tabs::-webkit-scrollbar{display:none}.tab{font-size:9px;padding:5px 12px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s}.tab.on{background:var(--g);color:#001a0e;border-color:var(--g);font-weight:700}.tab.ron.on{background:var(--r);color:#fff;border-color:var(--r)}.srch-wrap{position:relative;margin-bottom:10px}.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t2)}.srch{width:100%;padding:8px 10px 8px 30px;background:var(--bg2);border:1px solid var(--b0);border-radius:6px;color:var(--t0);font-size:11px;outline:none;font-family:var(--sans);transition:border-color .15s}.srch:focus{border-color:var(--g)}.srch::placeholder{color:var(--t2)}.list{display:flex;flex-direction:column;gap:6px}.cc{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;overflow:hidden}.cc.long{border-left:3px solid var(--g)}.cc.short{border-left:3px solid var(--r)}.cc.hot{background:linear-gradient(135deg,var(--bg2),rgba(0,255,136,.03))}.alert{padding:6px 12px;font-size:9px;font-weight:600;display:flex;align-items:center;gap:6px}.alert.danger{background:rgba(255,51,102,.12);color:#ff6688;border-bottom:1px solid rgba(255,51,102,.15)}.alert.warning{background:rgba(255,184,0,.1);color:#ffcc44;border-bottom:1px solid rgba(255,184,0,.15)}.alert.success{background:rgba(0,255,136,.08);color:#44ffaa;border-bottom:1px solid rgba(0,255,136,.12)}.cb{padding:10px 12px}.row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}.sym-area{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.sym{font-size:16px;font-weight:700}.badge{font-size:7px;padding:1px 5px;border-radius:2px;font-weight:700;letter-spacing:.04em}.hot-badge{background:var(--g2);color:var(--g);border:1px solid var(--g3)}.oi-badge{background:var(--a2);color:var(--a);border:1px solid var(--a3)}.price-area{text-align:right}.price{font-family:var(--mono);font-size:15px;font-weight:600}.chg{font-family:var(--mono);font-size:10px;font-weight:500;margin-top:1px}.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;padding:8px 10px;background:var(--bg3);border-radius:6px}.dc{display:flex;flex-direction:column;gap:2px}.dl{font-size:7px;color:var(--t2);letter-spacing:.03em;text-transform:uppercase}.dv{font-family:var(--mono);font-size:10px;font-weight:600}.dv2{font-size:8px;color:var(--t2);margin-top:1px}.bar{width:100%;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin-top:3px}.bf{height:100%;border-radius:1px}.ratbar{display:flex;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}.rbl{background:var(--g)}.rbs{background:var(--r)}.reasons{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}.rrow{display:flex;align-items:flex-start;gap:6px}.rlbl{font-size:7px;color:var(--t2);width:42px;flex-shrink:0;padding-top:2px}.rtag{font-size:7px;font-weight:700;padding:2px 6px;border-radius:2px;flex-shrink:0}.rt-g{background:rgba(0,255,136,.15);color:#00cc66}.rt-r{background:rgba(255,51,102,.15);color:#ff4477}.rt-a{background:rgba(255,184,0,.12);color:#cc9900}.rt-d{background:var(--b0);color:var(--t2)}.rdesc{font-size:8px;color:var(--t1);flex:1;line-height:1.5}.bot{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--b0)}.sig{font-size:9px;font-weight:700;padding:4px 10px;border-radius:4px}.sl{background:rgba(0,255,136,.12);color:var(--g);border:1px solid rgba(0,255,136,.2)}.ss{background:rgba(255,51,102,.12);color:var(--r);border:1px solid rgba(255,51,102,.2)}.sn{background:var(--b0);color:var(--t2)}.sig-time{font-family:var(--mono);font-size:8px;color:var(--t2);margin-left:6px}.score-final{display:flex;align-items:center;gap:4px}.sf-label{font-size:7px;color:var(--t2)}.sf-num{font-family:var(--mono);font-size:22px;font-weight:700}.larea{text-align:center;padding:40px 16px}.lbar{width:180px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin:10px auto}.lfill{height:100%;background:var(--g);animation:prog 1.6s ease-in-out infinite}@keyframes prog{0%{width:0%;margin-left:0}50%{width:55%;margin-left:22%}100%{width:0%;margin-left:100%}}.lmsg{font-size:10px;color:var(--t2);margin-top:6px}.sbar{position:fixed;bottom:0;left:0;right:0;background:rgba(5,6,8,.95);border-top:1px solid var(--b0);backdrop-filter:blur(12px);padding:6px 14px;display:flex;align-items:center;justify-content:space-between;font-size:8px;color:var(--t2)}</style></head><body>
<header class="hdr">
<div class="logo"><div class="logo-icon">⬡</div><div class="logo-text">OKX <span>FLOW</span></div><div class="logo-badge">PRO</div></div>
<div class="hdr-r"><span id="stpill" class="live-pill pload"><span>⏳</span>連接中</span><span class="hdr-time" id="clk">--:--</span><button class="hdr-btn" onclick="load(true)">↻</button></div>
</header>
<div class="mktbar">
<div class="mi"><span class="mi-label">恐貪</span><span class="mi-val" id="fg">--</span></div>
<div class="mi-sep"></div>
<div class="mi"><span class="mi-label">市場FR</span><span class="mi-val" id="avgfr">--</span></div>
<div class="mi-sep"></div>
<div class="mi"><span class="mi-label">OI異常</span><span class="mi-val" id="oicount">--</span></div>
<div class="mi-sep"></div>
<div class="mi"><span class="mi-label">更新</span><span class="mi-val" id="lupd">--</span></div>
</div>
<div class="wrap">
<div class="sum" id="sum">
<div class="sm g"><div class="sm-l">載入中</div><div class="sm-v" style="color:var(--t2)">--</div></div>
<div class="sm r"><div class="sm-l">請稍候</div><div class="sm-v" style="color:var(--t2)">--</div></div>
<div class="sm a"><div class="sm-l">--</div><div class="sm-v" style="color:var(--t2)">--</div></div>
</div>
<div class="tabs">
<button class="tab on" onclick="setTab('all',this)">全部</button>
<button class="tab" onclick="setTab('long',this)">做多</button>
<button class="tab ron" onclick="setTab('short',this)">做空</button>
<button class="tab" onclick="setTab('hot',this)">🔥強烈</button>
<button class="tab" onclick="setTab('alert',this)">⚠️警報</button>
<button class="tab" onclick="setTab('oia',this)">OI異常</button>
<button class="tab" onclick="setTab('fr+',this)">高FR</button>
</div>
<div class="srch-wrap"><span class="srch-icon">🔍</span><input class="srch" id="srch" placeholder="搜尋幣種，如 BTC / BSB / WLD..." oninput="apply()"></div>
<div class="list" id="list"><div class="larea"><div style="font-size:14px;margin-bottom:8px">⬡</div><div class="lbar"><div class="lfill"></div></div><div class="lmsg">正在從 Cloudflare 拉取即時數據...</div></div></div>
</div>
<div class="sbar"><span>OKX + 幣安 · 機構級數據</span><span id="lcnt">--</span></div>
<script>
const API='https://okx-flow.jjm57hkpr6.workers.dev/api/coins';
let ALL=[],MKT={},curTab='all',autoT=null;
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})},1000);
const fp=p=>{if(!p||isNaN(p))return'--';const n=+p;if(n>10000)return'$'+n.toLocaleString('en',{maximumFractionDigits:0});if(n>1000)return'$'+n.toLocaleString('en',{maximumFractionDigits:1});if(n>100)return'$'+n.toFixed(2);if(n>10)return'$'+n.toFixed(3);if(n>1)return'$'+n.toFixed(4);if(n>0.01)return'$'+n.toFixed(5);return'$'+n.toFixed(7)};
const fc=c=>(+c>=0?'+':'')+parseFloat(c).toFixed(2)+'%';
const ffr=v=>{const p=(+v*100).toFixed(4);return(+p>=0?'+':'')+p+'%'};
const SC=s=>+s>=80?'var(--g)':+s>=65?'#69f0ae':+s>=50?'var(--a)':+s>=35?'#ff7043':'var(--r)';
function reasons(c){
const R=[];const chg=+c.chg24h,fr=+c.frVal,wl=+c.whaleLong,rl=+c.retailLong,oi=+c.oiChangePct1h;
if(chg>6)R.push({l:'市場動能',t:'強勢看漲',cl:'rt-g',d:'漲幅 '+fc(chg)});
else if(chg>2)R.push({l:'市場動能',t:'看漲',cl:'rt-g',d:'漲幅 '+fc(chg)});
else if(chg<-6)R.push({l:'市場動能',t:'強勢看跌',cl:'rt-r',d:'跌幅 '+fc(chg)});
else if(chg<-2)R.push({l:'市場動能',t:'看跌',cl:'rt-r',d:'跌幅 '+fc(chg)});
else R.push({l:'市場動能',t:'方向不明',cl:'rt-a',d:'震盪 '+fc(chg)});
if(fr>0.005)R.push({l:'資金費率',t:'偏多',cl:'rt-g',d:ffr(fr)+' 多方付費'+(c.frAnomaly?' ⚠異常':'')});
else if(fr<-0.005)R.push({l:'資金費率',t:'偏空',cl:'rt-r',d:ffr(fr)+' 空方付費'});
else R.push({l:'資金費率',t:'中性',cl:'rt-a',d:ffr(fr)});
if(c.hasLSData){
if(wl>62)R.push({l:'大戶動向',t:'大戶偏多',cl:'rt-g',d:'大戶多頭 '+wl+'% 空頭 '+(100-wl)+'%'});
else if(wl<40)R.push({l:'大戶動向',t:'大戶偏空',cl:'rt-r',d:'大戶空頭 '+(100-wl)+'% 多頭 '+wl+'%'});
else R.push({l:'大戶動向',t:'均衡',cl:'rt-d',d:'大戶 '+wl+'% vs '+(100-wl)+'%'});
if(rl<38)R.push({l:'散戶倉鼠',t:'散戶偏空',cl:'rt-g',d:'散戶空 '+(100-rl)+'% 反向機會'});
else if(rl>62)R.push({l:'散戶倉鼠',t:'散戶偏多',cl:'rt-r',d:'散戶多 '+rl+'% 謹慎'});
else R.push({l:'散戶倉鼠',t:'均衡',cl:'rt-d',d:'散戶均衡'});
}else{
R.push({l:'大戶動向',t:'無數據',cl:'rt-d',d:'此幣無公開多空比'});
}
if(oi>5)R.push({l:'OI持倉',t:'快速增倉',cl:'rt-g',d:'1H +'+oi.toFixed(1)+'% 24H '+(+c.oiChangePct24h>=0?'+':'')+c.oiChangePct24h+'%'+(c.oiAnomalyCount>=3?' ⚡':'')});
else if(oi<-5)R.push({l:'OI持倉',t:'快速減倉',cl:'rt-r',d:'1H '+oi.toFixed(1)+'% 24H '+c.oiChangePct24h+'%'});
else R.push({l:'OI持倉',t:c.oiTrend||'持平',cl:oi>0?'rt-g':oi<0?'rt-r':'rt-d',d:'1H '+(oi>=0?'+':'')+oi.toFixed(1)+'%'});
if((+c.relBTC||0)>5)R.push({l:'相對強弱',t:'強於BTC',cl:'rt-g',d:'相較BTC +'+c.relBTC.toFixed(1)+'%'});
else if((+c.relBTC||0)<-5)R.push({l:'相對強弱',t:'弱於BTC',cl:'rt-r',d:'相較BTC '+c.relBTC.toFixed(1)+'%'});
return R;
}
function renderSum(){
const L=ALL.filter(c=>c.signal==='long').length;
const S=ALL.filter(c=>c.signal==='short').length;
const avgFR=ALL.reduce((s,c)=>s+(+c.frVal||0),0)/(ALL.length||1);
const hots=ALL.filter(c=>c.isHot).length;
const alerts=ALL.filter(c=>c.alerts&&c.alerts.length>0).length;
const oiAnoms=ALL.filter(c=>(+c.oiAnomalyCount||0)>=3).length;
const top=ALL[0];
document.getElementById('sum').innerHTML=
'<div class="sm g"><div class="sm-l">做多信號</div><div class="sm-v cg">'+L+'</div><div class="sm-s">共'+ALL.length+'合約</div></div>'+
'<div class="sm r"><div class="sm-l">做空信號</div><div class="sm-v cr">'+S+'</div><div class="sm-s">觀望'+(ALL.length-L-S)+'個</div></div>'+
'<div class="sm a"><div class="sm-l">⚠️警報</div><div class="sm-v ca">'+alerts+'</div><div class="sm-s">需注意幣種</div></div>'+
'<div class="sm g"><div class="sm-l">🔥強烈</div><div class="sm-v cg">'+hots+'</div><div class="sm-s">評分≥78</div></div>'+
'<div class="sm a"><div class="sm-l">OI異常</div><div class="sm-v ca">'+oiAnoms+'</div><div class="sm-s">持倉異動</div></div>'+
'<div class="sm p"><div class="sm-l">今日最強</div><div class="sm-v cp" style="font-size:15px">'+(top?top.sym:'--')+'</div><div class="sm-s cg">'+(top?fc(top.chg24h):'--')+'</div></div>';
const fg=MKT.fearGreed||'--';
document.getElementById('fg').textContent=fg+' '+(MKT.fearGreedText||'');
document.getElementById('fg').style.color=fg>70?'var(--r)':fg<30?'var(--g)':'var(--a)';
document.getElementById('avgfr').textContent=ffr(avgFR);
document.getElementById('avgfr').style.color=avgFR>0?'var(--g)':'var(--r)';
document.getElementById('oicount').textContent=oiAnoms+'個';
document.getElementById('lupd').textContent=MKT.updateTime||'--';
}
function renderList(coins){
const el=document.getElementById('list');
if(!coins.length){el.innerHTML='<div style="text-align:center;padding:24px;font-size:10px;color:var(--t2)">沒有符合條件</div>';return;}
el.innerHTML=coins.map(c=>{
const chg=+c.chg24h||0,fr=+c.frVal||0,wl=+c.whaleLong||50,rl=+c.retailLong||50,oi=+c.oiChangePct1h||0;
const frBW=Math.min(100,Math.abs(fr/0.001)*100);
const frBC=fr>0?'var(--g)':'var(--r)';
const rs=reasons(c);
const sig=c.signal==='long'?'<span class="sig sl">▲ 做多</span>':c.signal==='short'?'<span class="sig ss">▼ 做空</span>':'<span class="sig sn">— 觀望</span>';
const alertsHtml=(c.alerts||[]).map(a=>'<div class="alert '+a.level+'">'+a.msg+'</div>').join('');
const countdown=c.countdown>0?c.countdown+'分後結算':'--';
return'<div class="cc '+c.signal+' '+(c.isHot?'hot':'')+'">'+
alertsHtml+
'<div class="cb">'+
'<div class="row1"><div class="sym-area"><span class="sym">'+c.sym+'</span>'+(c.isHot?'<span class="badge hot-badge">HOT</span>':'')+((+c.oiAnomalyCount||0)>=3?'<span class="badge oi-badge">OI⚡</span>':'')+'</div><div class="price-area"><div class="price">'+fp(c.price)+'</div><div class="chg '+(chg>=0?'cg':'cr')+'">'+fc(chg)+'</div></div></div>'+
'<div class="dg">'+
'<div class="dc"><div class="dl">資金費率</div><div class="dv '+(fr>0?'cg':fr<0?'cr':'ca')+'">'+ffr(fr)+'</div><div class="dv2">'+countdown+'</div><div class="bar"><div class="bf" style="width:'+frBW+'%;background:'+frBC+'"></div></div></div>'+
'<div class="dc"><div class="dl">OI 1H</div><div class="dv '+(oi>=0?'cg':'cr')+'">'+(oi>=0?'+':'')+oi.toFixed(1)+'%</div><div class="dv2">'+(c.oiTrend||'持平')+'</div></div>'+
'<div class="dc"><div class="dl">相對BTC</div><div class="dv '+((+c.relBTC||0)>=0?'cg':'cr')+'">'+((+c.relBTC||0)>=0?'+':'')+((+c.relBTC||0)).toFixed(1)+'%</div></div>'+
'<div class="dc"><div class="dl">大戶多頭</div><div class="dv '+(wl>52?'cg':'cr')+'">'+wl+'%</div><div class="ratbar"><div class="rbl" style="width:'+wl+'%"></div><div class="rbs" style="width:'+(100-wl)+'%"></div></div></div>'+
'</div>'+
'<div class="reasons">'+rs.map(r=>'<div class="rrow"><span class="rlbl">'+r.l+'</span><span class="rtag '+r.cl+'">'+r.t+'</span><span class="rdesc">'+r.d+'</span></div>').join('')+'</div>'+
'<div class="bot"><div>'+sig+'<span class="sig-time">'+c.signalTime+'</span></div><div class="score-final"><span class="sf-label">評分</span><span class="sf-num" style="color:'+SC(c.score)+'">'+c.score+'</span></div></div>'+
'</div></div>';
}).join('');
}
function setTab(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curTab=t;apply();}
function apply(){
const q=document.getElementById('srch').value.toUpperCase().trim();
let list=ALL.filter(c=>{
if(q&&!c.sym.toUpperCase().includes(q))return false;
if(curTab==='long')return c.signal==='long';
if(curTab==='short')return c.signal==='short';
if(curTab==='hot')return c.isHot;
if(curTab==='alert')return c.alerts&&c.alerts.length>0;
if(curTab==='oia')return(+c.oiAnomalyCount||0)>=3;
if(curTab==='fr+')return(+c.frVal||0)>0.0005;
return true;
});
document.getElementById('lcnt').textContent=list.length+'個合約';
renderList(list);
}
async function load(manual=false){
const btn=document.querySelector('[onclick="load(true)"]');
if(manual&&btn){btn.textContent='⏳';btn.disabled=true;}
const pill=document.getElementById('stpill');
pill.className='live-pill pload';
pill.innerHTML='<span>⏳</span>更新中';
try{
const r=await fetch(API,{signal:AbortSignal.timeout(30000)});
if(!r.ok)throw new Error('HTTP '+r.status);
const j=await r.json();
if(!j.ok||!j.data?.length)throw new Error(j.msg||j.error||'no data');
ALL=j.data;MKT=j.market||{};
renderSum();apply();
pill.className='live-pill';
pill.innerHTML='<div class="live-dot"></div>LIVE·'+ALL.length;
clearTimeout(autoT);autoT=setTimeout(()=>load(),60000);
}catch(e){
pill.className='live-pill perr';
pill.innerHTML='⚠ 失敗';
document.getElementById('list').innerHTML='<div style="text-align:center;padding:30px"><div style="color:var(--r);font-size:10px;margin-bottom:10px">'+e.message+'</div><button onclick="load(true)" style="font-size:10px;padding:6px 14px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t0);cursor:pointer">↻ 重試</button></div>';
clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
}finally{if(manual&&btn){btn.textContent='↻';btn.disabled=false;}}
}
load();
</script></body></html>
