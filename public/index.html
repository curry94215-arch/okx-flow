<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#050608"><title>FLOW PRO</title><style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{--g:#00ff88;--g2:rgba(0,255,136,.08);--g3:rgba(0,255,136,.2);--r:#ff3366;--r2:rgba(255,51,102,.08);--r3:rgba(255,51,102,.2);--a:#ffb800;--a2:rgba(255,184,0,.08);--a3:rgba(255,184,0,.2);--pu:#a855f7;--pu3:rgba(168,85,247,.2);--cy:#00ccff;--cy3:rgba(0,204,255,.2);--bg0:#050608;--bg1:#090b0f;--bg2:#0d1117;--bg3:#111620;--bg4:#161c28;--b0:rgba(255,255,255,.04);--b1:rgba(255,255,255,.08);--t0:#e6edf3;--t1:#8b949e;--t2:#484f58;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg0);color:var(--t0);font-family:var(--sans);min-height:100dvh}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bg4)}
.hdr{position:sticky;top:0;z-index:100;background:rgba(5,6,8,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--b0);padding:0 12px;height:48px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em}.logo span{color:var(--g)}
.hdr-r{display:flex;align-items:center;gap:6px}
.lpill{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;font-weight:600}
.plive{background:var(--g2);color:var(--g);border:1px solid var(--g3)}.pload{background:var(--a2);color:var(--a);border:1px solid var(--a3)}.perr{background:var(--r2);color:var(--r);border:1px solid var(--r3)}
.ldot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.htime{font-family:var(--mono);font-size:9px;color:var(--t2)}
.hbtn{width:28px;height:28px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t1);cursor:pointer;font-size:12px}
.mkt{background:var(--bg1);border-bottom:1px solid var(--b0);padding:0 12px;height:32px;display:flex;align-items:center;gap:16px;overflow-x:auto}.mkt::-webkit-scrollbar{display:none}
.mi{display:flex;align-items:center;gap:5px;flex-shrink:0}.mil{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.04em}.miv{font-family:var(--mono);font-size:9px;font-weight:600}.msep{width:1px;height:14px;background:var(--b1)}
.wrap{padding:10px 10px 65px;max-width:520px;margin:0 auto}
.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
.sm{background:var(--bg2);border:1px solid var(--b0);border-radius:7px;padding:9px 10px;position:relative;overflow:hidden}
.sm::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sm.g::after{background:linear-gradient(90deg,var(--g),transparent)}.sm.r::after{background:linear-gradient(90deg,var(--r),transparent)}.sm.a::after{background:linear-gradient(90deg,var(--a),transparent)}.sm.p::after{background:linear-gradient(90deg,var(--pu),transparent)}.sm.cy::after{background:linear-gradient(90deg,var(--cy),transparent)}
.sml{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}.smv{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1;margin-bottom:2px}.sms{font-size:8px;color:var(--t2)}
.cg{color:var(--g)}.cr{color:var(--r)}.ca{color:var(--a)}.cp{color:var(--pu)}.ccy{color:var(--cy)}
.tabs{display:flex;gap:3px;overflow-x:auto;margin-bottom:8px}.tabs::-webkit-scrollbar{display:none}
.tab{font-size:9px;padding:4px 11px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap;font-weight:500}
.tab.on{background:var(--g);color:#001a0e;border-color:var(--g);font-weight:700}
.tab.ron.on{background:var(--r);color:#fff;border-color:var(--r)}
.tab.cyon.on{background:var(--cy);color:#001a1f;border-color:var(--cy)}
.srch-w{position:relative;margin-bottom:8px}.srchi{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t2)}
.srch{width:100%;padding:7px 9px 7px 28px;background:var(--bg2);border:1px solid var(--b0);border-radius:6px;color:var(--t0);font-size:11px;outline:none}.srch:focus{border-color:rgba(0,255,136,.3)}.srch::placeholder{color:var(--t2)}
.list{display:flex;flex-direction:column;gap:6px}
.cc{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;overflow:hidden}.cc.long{border-left:3px solid var(--g)}.cc.short{border-left:3px solid var(--r)}.cc.hot{background:linear-gradient(135deg,var(--bg2) 80%,rgba(0,255,136,.04))}
.alrt{padding:5px 11px;font-size:9px;font-weight:600;display:flex;align-items:center;gap:5px}.alrt.danger{background:rgba(255,51,102,.1);color:#ff6688;border-bottom:1px solid rgba(255,51,102,.12)}.alrt.warning{background:rgba(255,184,0,.08);color:#ffc933;border-bottom:1px solid rgba(255,184,0,.12)}.alrt.success{background:rgba(0,255,136,.06);color:#33ffaa;border-bottom:1px solid rgba(0,255,136,.1)}
.cb{padding:10px 11px}
.r1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}.r1l{display:flex;align-items:center;gap:5px;flex-wrap:wrap}.csym{font-size:17px;font-weight:700}
.badge{font-size:7px;padding:1px 5px;border-radius:2px;font-weight:700}
.hbadge{background:var(--g2);color:var(--g);border:1px solid var(--g3)}.obadge{background:var(--a2);color:var(--a);border:1px solid var(--a3)}.wlbadge{background:rgba(0,204,255,.1);color:var(--cy);border:1px solid var(--cy3)}.wsbadge{background:rgba(255,51,102,.1);color:var(--r);border:1px solid var(--r3)}
.pr{text-align:right}.price{font-family:var(--mono);font-size:15px;font-weight:600}.pchg{font-family:var(--mono);font-size:10px;margin-top:1px}.pchg1h{font-family:var(--mono);font-size:9px;color:var(--t2)}
.sig-row{margin-bottom:6px;padding:7px 9px;border-radius:7px;display:flex;align-items:center;justify-content:space-between}
.strong-long{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.22)}.mild-long{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.14)}.watch-long{background:rgba(0,255,136,.03);border:1px solid rgba(0,255,136,.08)}.neutral{background:var(--b0);border:1px solid var(--b1)}.watch-short{background:rgba(255,51,102,.03);border:1px solid rgba(255,51,102,.08)}.mild-short{background:rgba(255,51,102,.06);border:1px solid rgba(255,51,102,.14)}.strong-short{background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.22)}
.sig-l{display:flex;flex-direction:column;gap:2px}.sig-label{font-size:11px;font-weight:700}.sig-dt{font-family:var(--mono);font-size:8px;color:var(--t2)}.sig-r{display:flex;flex-direction:column;align-items:flex-end;gap:1px}.sig-score{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}.sig-count{font-size:8px;color:var(--t2);text-align:right}
.interp{font-size:9px;color:var(--t1);margin-bottom:7px;line-height:1.5;padding:5px 8px;background:var(--bg3);border-radius:5px}
.entry-box{background:linear-gradient(135deg,rgba(0,255,136,.07),rgba(0,255,136,.02));border:1px solid rgba(0,255,136,.18);border-radius:7px;padding:8px 10px;margin-bottom:7px}
.entry-title{font-size:8px;color:var(--g);font-weight:700;letter-spacing:.04em;margin-bottom:6px}
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.eg{display:flex;flex-direction:column;gap:1px}.egl{font-size:7px;color:var(--t2)}.egv{font-family:var(--mono);font-size:11px;font-weight:600}.egs{font-size:8px;color:var(--t1)}
.dblock{background:var(--bg3);border-radius:7px;padding:8px 10px;margin-bottom:6px}
.dbt{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.di{display:flex;flex-direction:column;gap:2px}.dl{font-size:7px;color:var(--t2)}.dv{font-family:var(--mono);font-size:11px;font-weight:600}.ds{font-size:8px;color:var(--t1);margin-top:1px}
.bar{width:100%;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin-top:3px}.bf{height:100%;border-radius:1px}
.ratbar{display:flex;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}.rbl{background:var(--g)}.rbs{background:var(--r)}
.larea{text-align:center;padding:50px 16px}.lbar{width:160px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin:12px auto}.lfill{height:100%;background:var(--g);animation:prog 1.6s ease-in-out infinite}@keyframes prog{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}.lmsg{font-size:10px;color:var(--t2);margin-top:8px}
.sbar{position:fixed;bottom:0;left:0;right:0;background:rgba(5,6,8,.96);border-top:1px solid var(--b0);backdrop-filter:blur(12px);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:8px;color:var(--t2)}
.batch-bar{height:2px;background:var(--bg3);margin-bottom:8px;border-radius:1px;overflow:hidden}
.batch-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--cy));transition:width .5s}
</style></head><body>
<header class="hdr">
<div class="logo">FLOW <span>PRO</span></div>
<div class="hdr-r">
<span id="stpill" class="lpill pload"><span class="ldot"></span>Loading</span>
<span class="htime" id="clk">--:--</span>
<button class="hbtn" onclick="load(true)">&#x21BB;</button>
</div>
</header>
<div class="mkt">
<div class="mi"><span class="mil">Fear&Greed</span><span class="miv" id="fg">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">BTC</span><span class="miv" id="btcchg">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">BTC FR</span><span class="miv" id="btcfr">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">Market L/S</span><span class="miv" id="mktls">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">Avg FR</span><span class="miv" id="avgfr">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">Hot</span><span class="miv" id="hotcnt">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">Updated</span><span class="miv" id="lupd">--</span></div>
</div>
<div class="wrap">
<div class="sum" id="sum">
<div class="sm g"><div class="sml">Loading</div><div class="smv" style="color:var(--t2)">--</div></div>
<div class="sm r"><div class="sml">Please wait</div><div class="smv" style="color:var(--t2)">--</div></div>
<div class="sm a"><div class="sml">--</div><div class="smv" style="color:var(--t2)">--</div></div>
</div>
<div class="batch-bar"><div class="batch-fill" id="batchfill" style="width:0%"></div></div>
<div class="tabs">
<button class="tab on" onclick="setTab('all',this)">All</button>
<button class="tab" onclick="setTab('recent',this)">&#x26A1; Recent</button>
<button class="tab" onclick="setTab('s5',this)">&#x1F534; Strong Long</button>
<button class="tab" onclick="setTab('s4',this)">&#x1F7E0; Mild Long</button>
<button class="tab ron" onclick="setTab('short',this)">Short</button>
<button class="tab cyon" onclick="setTab('vegas',this)">Vegas</button>
<button class="tab" onclick="setTab('wlong',this)">&#x1F433; Whale Long</button>
<button class="tab" onclick="setTab('wshort',this)">&#x1F43B; Whale Short</button>
<button class="tab" onclick="setTab('alert',this)">&#x26A0;&#xFE0F; Alert</button>
<button class="tab" onclick="setTab('oia',this)">OI Spike</button>
<button class="tab" onclick="setTab('surge',this)">&#x1F4C8; Surge</button>
<button class="tab" onclick="setTab('frflip',this)">FR Flip</button>
<button class="tab" onclick="setTab('rvol',this)">Volume</button>
</div>
<div class="srch-w"><span class="srchi">&#x1F50D;</span><input class="srch" id="srch" placeholder="Search BTC / ETH / DOGE..." oninput="apply()"></div>
<div class="list" id="list">
<div class="larea"><div style="font-size:20px">&#x2B21;</div><div class="lbar"><div class="lfill"></div></div><div class="lmsg">Fetching live data...</div></div>
</div>
</div>
<div class="sbar"><span>OKX Market Data + Bybit L/S</span><span id="lcnt">--</span></div>
<script>
const API='https://okx-flow.jjm57hkpr6.workers.dev/api/coins';
let ALL=[],MKT={},curTab='all',autoT=null;

setInterval(function(){
  var n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false});
},1000);

function fp(p){
  if(!p||isNaN(p))return'--';
  var n=+p;
  if(n>10000)return'$'+n.toLocaleString('en',{maximumFractionDigits:0});
  if(n>1000)return'$'+n.toLocaleString('en',{maximumFractionDigits:1});
  if(n>100)return'$'+n.toFixed(2);
  if(n>10)return'$'+n.toFixed(3);
  if(n>1)return'$'+n.toFixed(4);
  if(n>0.01)return'$'+n.toFixed(5);
  return'$'+n.toFixed(7);
}
function fc(c){return(+c>=0?'+':'')+parseFloat(c).toFixed(2)+'%';}
function ffr(v){var p=(+v*100).toFixed(4);return(+p>=0?'+':'')+p+'%';}
function SC(s){return s>=83?'var(--g)':s>=70?'#44ddaa':s>=58?'var(--a)':s>=43?'var(--t1)':s>=30?'#ff9955':'var(--r)';}
function scColor(sl){
  if(!sl)return'var(--t1)';
  var c=sl.color||'neutral';
  if(c==='strong-long')return'var(--g)';
  if(c==='mild-long')return'#44ddaa';
  if(c==='watch-long')return'#88ffcc';
  if(c==='strong-short')return'var(--r)';
  if(c==='mild-short')return'#ff6688';
  if(c==='watch-short')return'#ffaaaa';
  return'var(--t1)';
}

function renderSum(){
  var L=ALL.filter(function(c){return c.score>=58;}).length;
  var S=ALL.filter(function(c){return c.score<=42;}).length;
  var s5=ALL.filter(function(c){return c.score>=83;}).length;
  var alerts=ALL.filter(function(c){return c.alerts&&c.alerts.length>0;}).length;
  var surge=ALL.filter(function(c){return c.isSurge;}).length;
  var top=ALL[0]||{};
  document.getElementById('sum').innerHTML=
    '<div class="sm g"><div class="sml">Long Signal</div><div class="smv cg">'+L+'</div><div class="sms">Total '+ALL.length+'</div></div>'+
    '<div class="sm r"><div class="sml">Short Signal</div><div class="smv cr">'+S+'</div><div class="sms">Neutral '+(ALL.length-L-S)+'</div></div>'+
    '<div class="sm a"><div class="sml">Alerts</div><div class="smv ca">'+alerts+'</div><div class="sms">Watch</div></div>'+
    '<div class="sm g"><div class="sml">Strong Long</div><div class="smv cg">'+s5+'</div><div class="sms">Score>=83</div></div>'+
    '<div class="sm cy"><div class="sml">Surge</div><div class="smv ccy">'+surge+'</div><div class="sms">Chg>=15%</div></div>'+
    '<div class="sm g"><div class="sml">Top Today</div><div class="smv cg" style="font-size:15px">'+(top.sym||'--')+'</div><div class="sms cg">'+(top.chg24h!=null?fc(top.chg24h):'--')+'</div></div>';
  var fg=MKT.fearGreed||'--';
  document.getElementById('fg').textContent=fg+' '+(MKT.fearGreedText||'');
  document.getElementById('fg').style.color=fg>70?'var(--r)':fg<30?'var(--g)':'var(--a)';
  var btcChg=MKT.btcChg||0;
  document.getElementById('btcchg').textContent=(btcChg>=0?'+':'')+btcChg+'%';
  document.getElementById('btcchg').style.color=btcChg>=0?'var(--g)':'var(--r)';
  var btcFR=MKT.btcFR||0;
  document.getElementById('btcfr').textContent=(btcFR>=0?'+':'')+btcFR+'%';
  var mls=MKT.marketLongRatio||50;
  document.getElementById('mktls').textContent='L'+mls+'% S'+(100-mls)+'%';
  document.getElementById('mktls').style.color=mls>55?'var(--g)':mls<45?'var(--r)':'var(--a)';
  var avgFR=ALL.length?ALL.reduce(function(s,c){return s+(+c.frVal||0);},0)/ALL.length:0;
  document.getElementById('avgfr').textContent=ffr(avgFR);
  document.getElementById('avgfr').style.color=avgFR>0?'var(--g)':'var(--r)';
  document.getElementById('hotcnt').textContent=s5+'';
  document.getElementById('lupd').textContent=MKT.updateTime||'--';
  var pct=MKT.totalBatches?Math.round(((MKT.currentBatch||0)+1)/MKT.totalBatches*100):100;
  document.getElementById('batchfill').style.width=Math.min(100,pct)+'%';
}

function renderList(coins){
  var el=document.getElementById('list');
  if(!coins.length){el.innerHTML='<div style="text-align:center;padding:30px;font-size:10px;color:var(--t2)">No results</div>';return;}
  var html='';
  for(var i=0;i<coins.length;i++){
    var c=coins[i];
    try{
      var chg=+c.chg24h||0;
      var chg1h=+c.chg1h||0;
      var fr=+c.frVal||0;
      var wl=+c.whaleLong||50;
      var rl=+c.retailLong||50;
      var oi1h=+c.oiChangePct1h||0;
      var oi24h=+c.oiChangePct24h||0;
      var sl=c.signalLevel||{label:'Neutral',color:'neutral'};
      var sc=scColor(sl);
      var frBW=Math.min(100,Math.abs(fr/0.001)*100);
      var sigCnt=c.sigCount||{count:0,gainSince:0};
      var showEntry=c.score>=58&&c.entryPrice;
      var alertsHtml='';
      var alerts=c.alerts||[];
      for(var a=0;a<alerts.length;a++){
        alertsHtml+='<div class="alrt '+alerts[a].level+'">'+alerts[a].msg+'</div>';
      }
      var wlBig=wl>=60&&c.hasLSData;
      var wsBig=wl<=40&&c.hasLSData;
      html+='<div class="cc '+(c.score>=58?'long':c.score<=42?'short':'')+' '+(c.isHot?'hot':'')+'">';
      html+=alertsHtml;
      html+='<div class="cb">';
      html+='<div class="r1"><div class="r1l"><span class="csym">'+c.sym+'</span>';
      if(c.isHot)html+='<span class="badge hbadge">HOT</span>';
      if(c.isOIBomb)html+='<span class="badge obadge">OI!</span>';
      if(c.frFlip===1)html+='<span class="badge" style="background:var(--g2);color:var(--g);border:1px solid var(--g3)">FR+</span>';
      if(c.frFlip===-1)html+='<span class="badge wsbadge">FR-</span>';
      if((+c.rvol||1)>=2)html+='<span class="badge" style="background:var(--a2);color:var(--a);border:1px solid var(--a3)">Vol'+c.rvol+'x</span>';
      if(wlBig)html+='<span class="badge wlbadge">Whale L'+wl+'%</span>';
      if(wsBig)html+='<span class="badge wsbadge">Whale S'+(100-wl)+'%</span>';
      if(c.isSurge)html+='<span class="badge" style="background:var(--a2);color:var(--a);border:1px solid var(--a3)">+'+chg.toFixed(0)+'%</span>';
      html+='</div>';
      html+='<div class="pr"><div class="price">'+fp(c.price)+'</div>';
      html+='<div class="pchg '+(chg>=0?'cg':'cr')+'">'+fc(chg)+'</div>';
      html+='<div class="pchg1h">1H '+(chg1h>=0?'+':'')+chg1h.toFixed(2)+'%</div></div></div>';
      html+='<div class="sig-row '+sl.color+'" style="color:'+sc+'">';
      html+='<div class="sig-l"><div class="sig-label">'+sl.label+'</div>';
      html+='<div class="sig-dt">'+(c.signalTime||'--')+'</div></div>';
      html+='<div class="sig-r"><div class="sig-score" style="color:'+SC(c.score)+'">'+c.score+'</div>';
      if(sigCnt.count>0)html+='<div class="sig-count">Triggered '+sigCnt.count+'x</div>';
      html+='</div></div>';
      if(c.interpretation)html+='<div class="interp">'+c.interpretation+'</div>';
      if(showEntry){
        html+='<div class="entry-box"><div class="entry-title">Entry Plan</div>';
        html+='<div class="entry-grid">';
        html+='<div class="eg"><div class="egl">Entry</div><div class="egv cg">'+fp(c.entryPrice)+'</div></div>';
        html+='<div class="eg"><div class="egl">Stop Loss</div><div class="egv cr">'+fp(c.stopLoss)+'</div></div>';
        html+='<div class="eg"><div class="egl">TP1 (1:2)</div><div class="egv" style="color:#44ddaa">'+fp(c.tp1)+'</div></div>';
        html+='<div class="eg"><div class="egl">TP2 (1:3)</div><div class="egv cg">'+fp(c.tp2)+'</div></div>';
        html+='</div>';
        if(sigCnt.gainSince!=0)html+='<div style="margin-top:6px;font-size:8px;color:var(--t1)">Since signal: <span style="color:'+(sigCnt.gainSince>=0?'var(--g)':'var(--r)')+'">'+(sigCnt.gainSince>=0?'+':'')+sigCnt.gainSince+'%</span></div>';
        html+='</div>';
      }
      html+='<div class="dblock"><div class="dbt">OI Analysis</div><div class="dgrid">';
      html+='<div class="di"><div class="dl">1H Change</div><div class="dv '+(oi1h>=0?'cg':'cr')+'">'+(oi1h>=0?'+':'')+oi1h.toFixed(2)+'%</div><div class="ds">'+(c.oiTrend||'--')+'</div></div>';
      html+='<div class="di"><div class="dl">24H Change</div><div class="dv '+(oi24h>=0?'cg':'cr')+'">'+(oi24h>=0?'+':'')+oi24h.toFixed(2)+'%</div><div class="ds">'+(c.oiStrength||'--')+'</div></div>';
      html+='<div class="di"><div class="dl">OI Value</div><div class="dv">$'+(+c.oiUSDValue||0)+'M</div></div>';
      html+='<div class="di"><div class="dl">Continuous</div><div class="dv '+(c.oiContinuous>0?'cg':c.oiContinuous<0?'cr':'ca')+'">'+(c.oiContinuous||0)+'</div></div>';
      html+='</div></div>';
      html+='<div class="dblock"><div class="dbt">Funding Rate</div><div class="dgrid">';
      html+='<div class="di"><div class="dl">Current FR</div><div class="dv '+(fr>0?'cg':fr<0?'cr':'ca')+'">'+ffr(fr)+'</div><div class="ds">'+(fr>0.005?'Longs pay':fr<-0.005?'Shorts pay':'Neutral')+'</div><div class="bar"><div class="bf" style="width:'+frBW+'%;background:'+(fr>0?'var(--g)':'var(--r)')+'"></div></div></div>';
      html+='<div class="di"><div class="dl">Next Funding</div><div class="dv">'+(c.nextFunding||'--')+'</div><div class="ds">'+(c.countdown>0?c.countdown+'min':'--')+'</div></div>';
      html+='<div class="di"><div class="dl">Rel BTC</div><div class="dv '+(+c.relBTC>=0?'cg':'cr')+'">'+(+c.relBTC>=0?'+':'')+(+c.relBTC||0)+'%</div><div class="ds">'+(+c.relBTC>5?'Independent':+c.relBTC>0?'Stronger':'Weaker')+'</div></div>';
      html+='<div class="di"><div class="dl">FR Flip</div><div class="dv '+(c.frFlip===1?'cg':c.frFlip===-1?'cr':'ca')+'">'+(c.frFlip===1?'+ Flipped':c.frFlip===-1?'- Flipped':'None')+'</div></div>';
      html+='</div></div>';
      html+='<div class="dblock"><div class="dbt">Whale Position '+(c.hasLSData?'(OKX+Bybit)':'(Market avg)')+'</div><div class="dgrid">';
      html+='<div class="di"><div class="dl">Whale Long</div><div class="dv '+(wl>52?'cg':wl<48?'cr':'ca')+'">'+wl+'%</div><div class="ds">Short '+(100-wl)+'%</div><div class="ratbar"><div class="rbl" style="width:'+wl+'%"></div><div class="rbs" style="width:'+(100-wl)+'%"></div></div></div>';
      html+='<div class="di"><div class="dl">Retail Long</div><div class="dv '+(rl<48?'cg':rl>52?'cr':'ca')+'">'+rl+'%</div><div class="ds">'+(rl<35?'Retail short (contrarian)':rl>65?'Retail chasing':'Balanced')+'</div></div>';
      html+='</div></div>';
      html+='<div class="dblock"><div class="dbt">Volume / CVD</div><div class="dgrid">';
      html+='<div class="di"><div class="dl">CVD Dir</div><div class="dv '+(c.futCVDDir==='Buy'?'cg':c.futCVDDir==='Sell'?'cr':'ca')+'">'+(c.futCVDDir||'--')+'</div><div class="ds">'+(c.cvdText||'--')+'</div></div>';
      html+='<div class="di"><div class="dl">RVOL</div><div class="dv '+((+c.rvol>=2)?'ca':'')+'">'+((+c.rvol||1).toFixed(1))+'x</div><div class="ds">'+((+c.rvol>=3)?'Spike':( +c.rvol>=2)?'High':'Normal')+'</div></div>';
      html+='<div class="di"><div class="dl">Taker</div><div class="dv '+((+c.taker>=52)?'cg':(+c.taker<=48)?'cr':'ca')+'">'+(+c.taker||50)+'%</div><div class="ds">'+(c.takerTrend||'--')+'</div></div>';
      html+='<div class="di"><div class="dl">Score</div><div class="dv" style="color:'+SC(c.score)+'">'+c.score+'</div></div>';
      html+='</div></div>';
      html+='</div></div>';
    }catch(e){
      html+='<div class="cc"><div class="cb" style="color:var(--t2);font-size:10px">'+(c.sym||'?')+' error</div></div>';
    }
  }
  el.innerHTML=html;
}

function setTab(t,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  curTab=t;
  apply();
}

function apply(){
  var q=document.getElementById('srch').value.toUpperCase().trim();
  var list=ALL.filter(function(c){
    if(q&&c.sym.toUpperCase().indexOf(q)<0)return false;
    if(curTab==='recent')return c.score>=58||c.score<=42;
    if(curTab==='vegas'){var pos=(c.price-(c.low24h||0))/((c.high24h||c.price)-(c.low24h||c.price)||1);return pos>0.7&&c.oiChangePct1h>3||pos<0.3&&c.oiChangePct1h<-3;}
    if(curTab==='s5')return c.score>=83;
    if(curTab==='s4')return c.score>=70&&c.score<83;
    if(curTab==='short')return c.score<=42;
    if(curTab==='alert')return c.alerts&&c.alerts.length>0;
    if(curTab==='oia')return c.isOIBomb;
    if(curTab==='surge')return c.isSurge;
    if(curTab==='frflip')return c.frFlip!==0;
    if(curTab==='rvol')return(+c.rvol||1)>=2;
    if(curTab==='wlong')return(+c.whaleLong||50)>=60&&c.hasLSData;
    if(curTab==='wshort')return(+c.whaleLong||50)<=40&&c.hasLSData;
    return true;
  });
  if(curTab==='surge')list.sort(function(a,b){return b.chg24h-a.chg24h;});
  else if(curTab==='recent')list.sort(function(a,b){return(b.signalTime||'').localeCompare(a.signalTime||'');});
  else if(curTab==='wlong')list.sort(function(a,b){return(+b.whaleLong||50)-(+a.whaleLong||50);});
  else if(curTab==='wshort')list.sort(function(a,b){return(+a.whaleLong||50)-(+b.whaleLong||50);});
  else list.sort(function(a,b){
    var aP=(a.isOIBomb&&a.isSurge)?3:(a.isOIBomb||a.isSurge)?2:a.score>=83?1:0;
    var bP=(b.isOIBomb&&b.isSurge)?3:(b.isOIBomb||b.isSurge)?2:b.score>=83?1:0;
    if(aP!==bP)return bP-aP;
    return b.score-a.score;
  });
  document.getElementById('lcnt').textContent=list.length+' coins';
  renderList(list);
}

async function load(manual){
  var btn=document.querySelector('[onclick="load(true)"]');
  if(manual&&btn){btn.textContent='...';btn.disabled=true;}
  var pill=document.getElementById('stpill');
  pill.className='lpill pload';
  pill.innerHTML='<span class="ldot"></span>Loading';
  try{
    var r=await fetch(API,{signal:AbortSignal.timeout(30000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var j=await r.json();
    if(!j.ok)throw new Error(j.error||'API error');
    if(!j.data||!j.data.length)throw new Error('No data (count:'+(j.count||0)+')');
    ALL=j.data;
    MKT=j.market||{};
    pill.className='lpill plive';
    pill.innerHTML='<span class="ldot"></span>LIVE '+ALL.length;
    renderSum();
    apply();
    clearTimeout(autoT);
    autoT=setTimeout(function(){load(false);},30000);
  }catch(e){
    pill.className='lpill perr';
    pill.innerHTML='Error';
    document.getElementById('list').innerHTML='<div style="text-align:center;padding:30px"><div style="color:var(--r);font-size:10px;margin-bottom:10px">'+e.message+'</div><button onclick="load(true)" style="font-size:10px;padding:6px 14px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t0);cursor:pointer">Retry</button></div>';
    clearTimeout(autoT);
    autoT=setTimeout(function(){load(false);},30000);
  }finally{
    if(manual&&btn){btn.textContent='&#x21BB;';btn.disabled=false;}
  }
}
load(false);
</script></body></html>
