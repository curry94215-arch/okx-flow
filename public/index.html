<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOW PRO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
      background: #0f0f23;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: rgba(0,212,255,0.1); border-radius: 10px; }
    .logo { font-size: 24px; font-weight: 700; color: #00d4ff; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: rgba(0,212,255,0.1); padding: 15px; border-radius: 8px; text-align: center; }
    .stat-label { font-size: 11px; color: #88ccee; }
    .stat-value { font-size: 24px; font-weight: 700; color: #00d4ff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; padding: 15px; }
    .card-title { font-size: 16px; font-weight: 700; color: #00d4ff; margin-bottom: 10px; }
    .metric { display: flex; justify-content: space-between; font-size: 12px; margin: 5px 0; }
    .metric-label { color: #88ccee; }
    .metric-value { color: #fff; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">FLOW PRO</div>
      <button onclick="fetchData()" style="padding: 8px 16px; background: #00d4ff; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">🔄 Refresh</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="total">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">🚀 Long</div>
        <div class="stat-value" id="long">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">📉 Short</div>
        <div class="stat-value" id="short">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">⏱️ Update</div>
        <div class="stat-value" id="time">--:--</div>
      </div>
    </div>

    <div class="grid" id="grid">
      <div style="text-align: center; padding: 40px; color: #88ccee;">Loading...</div>
    </div>
  </div>

  <script>
    async function fetchData() {
      try {
        const resp = await fetch('/api/coins');
        const result = await resp.json();
        
        if (!result.ok) {
          document.getElementById('grid').innerHTML = '<div style="padding: 40px; color: #f87171;">Error: ' + (result.error || 'Unknown error') + '</div>';
          return;
        }

        const coins = result.data || [];
        
        document.getElementById('total').textContent = coins.length;
        document.getElementById('long').textContent = coins.filter(c => c.color === 'strong-long').length;
        document.getElementById('short').textContent = coins.filter(c => c.color === 'strong-short').length;
        document.getElementById('time').textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false }).substring(0, 5);

        const html = coins.map(coin => `
          <div class="card">
            <div class="card-title">${coin.symbol}</div>
            <div class="metric">
              <span class="metric-label">Price</span>
              <span class="metric-value">$${coin.price}</span>
            </div>
            <div class="metric">
              <span class="metric-label">24h</span>
              <span class="metric-value" style="color: ${coin.change24h >= 0 ? '#4ade80' : '#f87171'};">${coin.change24h >= 0 ? '+' : ''}${coin.change24h}%</span>
            </div>
            <div class="metric">
              <span class="metric-label">OI</span>
              <span class="metric-value">${coin.oi}</span>
            </div>
            <div class="metric">
              <span class="metric-label">FR</span>
              <span class="metric-value" style="color: ${coin.fr >= 0 ? '#4ade80' : '#f87171'};">${coin.fr}%</span>
            </div>
            <div class="metric">
              <span class="metric-label">Signal</span>
              <span class="metric-value">${coin.emoji} ${coin.signal}</span>
            </div>
            <div class="metric">
              <span class="metric-label">Score</span>
              <span class="metric-value">${coin.score}</span>
            </div>
          </div>
        `).join('');

        document.getElementById('grid').innerHTML = html;
      } catch (e) {
        document.getElementById('grid').innerHTML = '<div style="padding: 40px; color: #f87171;">Error: ' + e.message + '</div>';
      }
    }

    setInterval(fetchData, 15000);
    fetchData();
  </script>
</body>
</html>
