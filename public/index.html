/* 維加斯卡片 */
.vcard{background:linear-gradient(135deg,var(--bg2) 60%,rgba(168,85,247,.06));border:1px solid rgba(168,85,247,.2);border-radius:10px;overflow:hidden;margin-bottom:6px}

.recent-card{background:var(--bg2);border:1px solid var(--b0);border-radius:8px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.rc-left{display:flex;flex-direction:column;gap:2px}

.larea{text-align:center;padding:50px 16px}.lbar{width:160px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin:12px auto}.lfill{height:100%;background:var(--g);animation:prog 1.6s ease-in-out infinite}@keyframes prog{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}.lmsg{font-size:10px;color:var(--t2);margin-top:8px}

</style></head><body>

</div>
</div>
<div class="sbar"><span>幣安全市場 · OKX+Bybit多空聚合</span><span id="lcnt">--</span></div>
<script>
const API='https://okx-flow.jjm57hkpr6.workers.dev/api/coins';
let ALL=[],MKT={},curTab='all',autoT=null;
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})},1000);
const fp=p=>{if(!p||isNaN(p))return'--';const n=+p;if(n>10000)return'$'+n.toLocaleString('en',{maximumFractionDigits:0});if(n>1000)return'$'+n.toLocaleString('en',{maximumFractionDigits:1});if(n>100)return'$'+n.toFixed(2);if(n>10)return'$'+n.toFixed(3);if(n>1)return'$'+n.toFixed(4);if(n>0.01)return'$'+n.toFixed(5);return'$'+n.toFixed(7)};
const fc=c=>(+c>=0?'+':'')+parseFloat(c).toFixed(2)+'%';
const ffr=v=>{const p=(+v*100).toFixed(4);return(+p>=0?'+':'')+p+'%'};
const SC=s=>s>=83?'var(--g)':s>=70?'#44ddaa':s>=58?'var(--a)':s>=43?'var(--t1)':s>=30?'#ff9955':'var(--r)';
const sigColor=sl=>{if(!sl)return'var(--t1)';return sl.color==='strong-long'?'var(--g)':sl.color==='mild-long'?'#44ddaa':sl.color==='watch-long'?'#88ffcc':sl.color==='strong-short'?'var(--r)':sl.color==='mild-short'?'#ff6688':sl.color==='watch-short'?'#ffaaaa':'var(--t1)';};

// 維加斯通道判斷(EMA144/169模擬)
function getVegasSignal(c){
  const price=+c.price;
  const chg1h=+c.chg1h||0;
  const oiChg1h=+c.oiChangePct1h||0;
  const relBTC=+c.relBTC||0;
  const taker=+c.taker||50;
  const cvdDiff=+c.cvdDiff||0;
  // 用價格在24H區間位置模擬通道位置
  const pos=+c.pricePos||(price-(+c.low24h||price*0.95))/(((+c.high24h||price*1.05)-(+c.low24h||price*0.95))||1);
  let vegasPos='通道內';
  let vegasColor='neutral';
  let vegasScore=0;
  if(pos>0.75&&chg1h>1&&oiChg1h>3){vegasPos='突破上方';vegasColor='strong-long';vegasScore=2;}
  else if(pos>0.6&&chg1h>0&&oiChg1h>0){vegasPos='站上通道';vegasColor='mild-long';vegasScore=1;}
  else if(pos<0.25&&chg1h<-1&&oiChg1h<-3){vegasPos='跌破下方';vegasColor='strong-short';vegasScore=-2;}
  else if(pos<0.4&&chg1h<0&&oiChg1h<0){vegasPos='跌入通道';vegasColor='mild-short';vegasScore=-1;}
  // 搭配數據確認
  const confirm=[];
  if(oiChg1h>5)confirm.push('OI增倉+'+(oiChg1h).toFixed(1)+'%');
  if(taker>58)confirm.push('買壓'+taker+'%');
  if(cvdDiff>0.15)confirm.push('CVD正值');
  if(relBTC>3)confirm.push('強於BTC+'+relBTC+'%');
  if(oiChg1h<-5)confirm.push('OI減倉'+(oiChg1h).toFixed(1)+'%');
  if(taker<42)confirm.push('賣壓'+(100-taker)+'%');
  if(cvdDiff<-0.15)confirm.push('CVD負值');
  if(relBTC<-3)confirm.push('弱於BTC'+relBTC+'%');
  return{vegasPos,vegasColor,vegasScore,confirm,pos};
}

function renderSum(){
  const L=ALL.filter(c=>c.score>=58).length;
  const S=ALL.filter(c=>c.score<=42).length;
  const s5=ALL.filter(c=>c.score>=83).length;
  const alerts=ALL.filter(c=>c.alerts&&c.alerts.length>0).length;
  const surge=ALL.filter(c=>c.isSurge).length;
  const wlong=ALL.filter(c=>(+c.whaleLong||50)>=60&&c.hasLSData).length;
  const top=ALL[0];
  document.getElementById('sum').innerHTML=
    '<div class="sm g"><div class="sml">做多信號</div><div class="smv cg">'+L+'</div><div class="sms">共'+ALL.length+'幣</div></div>'+
    '<div class="sm r"><div class="sml">做空信號</div><div class="smv cr">'+S+'</div><div class="sms">觀望'+(ALL.length-L-S)+'個</div></div>'+
    '<div class="sm a"><div class="sml">警報</div><div class="smv ca">'+alerts+'</div><div class="sms">需注意</div></div>'+
    '<div class="sm g"><div class="sml">🔴強烈做多</div><div class="smv cg">'+s5+'</div><div class="sms">評分≥83</div></div>'+
    '<div class="sm cy"><div class="sml">📈飆漲幣</div><div class="smv ccy">'+surge+'</div><div class="sms">漲幅≥15%</div></div>'+
    '<div class="sm g"><div class="sml">今日最強</div><div class="smv cg" style="font-size:15px">'+(top?top.sym:'--')+'</div><div class="sms cg">'+(top?fc(top.chg24h):'--')+'</div></div>';
  const fg=MKT.fearGreed||'--';
  document.getElementById('fg').textContent=fg+' '+(MKT.fearGreedText||'');
  document.getElementById('fg').style.color=fg>70?'var(--r)':fg<30?'var(--g)':'var(--a)';
  document.getElementById('btcchg').textContent=(MKT.btcChg>=0?'+':'')+MKT.btcChg+'%';
  document.getElementById('btcchg').style.color=MKT.btcChg>=0?'var(--g)':'var(--r)';
  document.getElementById('btcd').textContent=(MKT.btcDominance||'--')+'%';
  document.getElementById('btcd').style.color=(MKT.btcDominance||0)>55?'var(--r)':'var(--g)';
  const mls=MKT.marketLongRatio||50;
  document.getElementById('mktls').textContent='多'+mls+'% 空'+(100-mls)+'%';
  document.getElementById('mktls').style.color=mls>55?'var(--g)':mls<45?'var(--r)':'var(--a)';
  const avgFR=ALL.reduce((s,c)=>s+(+c.frVal||0),0)/(ALL.length||1);
  document.getElementById('avgfr').textContent=ffr(avgFR);
  document.getElementById('avgfr').style.color=avgFR>0?'var(--g)':'var(--r)';

  const pct=MKT.totalBatches?Math.round(((MKT.currentBatch+1)/MKT.totalBatches)*100):100;
  document.getElementById('batchfill').style.width=pct+'%';
}

function setTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curTab=t;
  apply();
}

function apply(){
  const q=document.getElementById('srch').value.toUpperCase().trim();
  let list=ALL.filter(c=>{
    if(q&&!c.sym.toUpperCase().includes(q))return false;
    if(curTab==='recent')return true;
    if(curTab==='vegas'){
      const v=getVegasSignal(c);
      return v.vegasScore!==0;
    }
    if(curTab==='s5')return c.score>=83;
    if(curTab==='s4')return c.score>=70&&c.score<83;
    if(curTab==='short')return c.score<=42;
    if(curTab==='alert')return c.alerts&&c.alerts.length>0;
    if(curTab==='independent')return(+c.relBTC||0)>5&&(+c.chg24h||0)>3&&(+c.oiChangePct1h||0)>3;
    if(curTab==='oia')return(+c.oiAnomalyCount||0)>=3;
    if(curTab==='surge')return c.isSurge;
    if(curTab==='frflip')return c.frFlip!==0;
    if(curTab==='rvol')return(+c.rvol||1)>=2;
    if(curTab==='expired')return c.signalExpired;
    if(curTab==='wlong')return(+c.whaleLong||50)>=60&&c.hasLSData;
    if(curTab==='wshort')return(+c.whaleLong||50)<=40&&c.hasLSData;
    return true;
  });
  // 維加斯 tab 按維加斯評分排
  if(curTab==='vegas'){
    list.sort((a,b)=>{
      const av=getVegasSignal(a),bv=getVegasSignal(b);
      return Math.abs(bv.vegasScore)-Math.abs(av.vegasScore)||b.score-a.score;
    });
  } else if(curTab==='surge'){
    list.sort((a,b)=>b.chg24h-a.chg24h);
  } else if(curTab==='wlong'){
    list.sort((a,b)=>(+b.whaleLong||50)-(+a.whaleLong||50));
  } else if(curTab==='wshort'){
    list.sort((a,b)=>(+a.whaleLong||50)-(+b.whaleLong||50));
  } else if(curTab!=='recent'){
    list.sort((a,b)=>{
      const aP=(a.isOIBomb&&a.isSurge)?3:(a.isOIBomb||a.isSurge)?2:a.score>=83?1:0;
      const bP=(b.isOIBomb&&b.isSurge)?3:(b.isOIBomb||b.isSurge)?2:b.score>=83?1:0;
      if(aP!==bP)return bP-aP;
      return b.score-a.score;
    });
  }
  document.getElementById('lcnt').textContent=list.length+'個合約';
  renderList(list);
}

async function load(manual=false){
  const btn=document.querySelector('[onclick="load(true)"]');
  if(manual&&btn){btn.textContent='⏳';btn.disabled=true;}
  const pill=document.getElementById('stpill');
  pill.className='lpill pload';pill.innerHTML='<span class="ldot"></span>更新中';
  try{
    const r=await fetch(API,{signal:AbortSignal.timeout(30000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!j.ok||!j.data?.length)throw new Error(j.msg||j.error||'no data');
    ALL=j.data;MKT=j.market||{};
    renderSum();apply();
    pill.className='lpill plive';
    pill.innerHTML='<span class="ldot"></span>LIVE·'+ALL.length;
    clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
  }catch(e){
    pill.className='lpill perr';pill.innerHTML='<span>⚠</span> 失敗';
    document.getElementById('list').innerHTML='<div style="text-align:center;padding:30px"><div style="color:var(--r);font-size:10px;margin-bottom:10px">'+e.message+'</div><button onclick="load(true)" style="font-size:10px;padding:6px 14px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t0);cursor:pointer">重試</button></div>';
    clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
  }finally{if(manual&&btn){btn.textContent='↻';btn.disabled=false;}}
}
load();
