<script>
const API='/api/coins';
let ALL=[],MKT={},curTab='all',autoT=null;
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})},1000);
const fp=p=>{if(!p||isNaN(p))return'--';const n=+p;if(n>10000)return'$'+n.toLocaleString('en',{maximumFractionDigits:0});if(n>1000)return'$'+n.toLocaleString('en',{maximumFractionDigits:1});if(n>100)return'$'+n.toFixed(2);if(n>10)return'$'+n.toFixed(3);if(n>1)return'$'+n.toFixed(4);if(n>0.01)return'$'+n.toFixed(5);return'$'+n.toFixed(7)};
const fc=c=>(+c>=0?'+':'')+parseFloat(c).toFixed(2)+'%';
const ffr=v=>{const p=(+v*100).toFixed(4);return(+p>=0?'+':'')+p+'%'};
const SC=s=>s>=83?'var(--g)':s>=70?'#44ddaa':s>=58?'var(--a)':s>=43?'var(--t1)':s>=30?'#ff9955':'var(--r)';
const sigColor=sl=>{if(!sl)return'var(--t1)';return sl.color==='strong-long'?'var(--g)':sl.color==='mild-long'?'#44ddaa':sl.color==='watch-long'?'#88ffcc':sl.color==='strong-short'?'var(--r)':sl.color==='mild-short'?'#ff6688':sl.color==='watch-short'?'#ffaaaa':'var(--t1)';};

// з¶ӯеҠ ж–ҜйҖҡйҒ“еҲӨж–·(EMA144/169жЁЎж“¬)
function getVegasSignal(c){
  const price=+c.price;
  const chg1h=+c.chg1h||0;
  const oiChg1h=+c.oiChangePct1h||0;
  const relBTC=+c.relBTC||0;
  const taker=+c.taker||50;
  const cvdDiff=+c.cvdDiff||0;
  // з”Ёеғ№ж јеңЁ24HеҚҖй–“дҪҚзҪ®жЁЎж“¬йҖҡйҒ“дҪҚзҪ®
  const pos=(price-(+c.low24h||price*0.95))/(((+c.high24h||price*1.05)-(+c.low24h||price*0.95))||1);
  let vegasPos='йҖҡйҒ“е…§';
  let vegasColor='neutral';
  let vegasScore=0;
  if(pos>0.75&&chg1h>1&&oiChg1h>3){vegasPos='зӘҒз ҙдёҠж–№';vegasColor='strong-long';vegasScore=2;}
  else if(pos>0.6&&chg1h>0&&oiChg1h>0){vegasPos='з«ҷдёҠйҖҡйҒ“';vegasColor='mild-long';vegasScore=1;}
  else if(pos<0.25&&chg1h<-1&&oiChg1h<-3){vegasPos='и·Ңз ҙдёӢж–№';vegasColor='strong-short';vegasScore=-2;}
  else if(pos<0.4&&chg1h<0&&oiChg1h<0){vegasPos='и·Ңе…ҘйҖҡйҒ“';vegasColor='mild-short';vegasScore=-1;}
  // жҗӯй…Қж•ёж“ҡзўәиӘҚ
  const confirm=[];
  if(oiChg1h>5)confirm.push('OIеўһеҖү+'+(oiChg1h).toFixed(1)+'%');
  if(taker>58)confirm.push('иІ·еЈ“'+taker+'%');
  if(cvdDiff>0.15)confirm.push('CVDжӯЈеҖј');
  if(relBTC>3)confirm.push('еј·ж–јBTC+'+relBTC+'%');
  if(oiChg1h<-5)confirm.push('OIжёӣеҖү'+(oiChg1h).toFixed(1)+'%');
  if(taker<42)confirm.push('иіЈеЈ“'+(100-taker)+'%');
  if(cvdDiff<-0.15)confirm.push('CVDиІ еҖј');
  if(relBTC<-3)confirm.push('ејұж–јBTC'+relBTC+'%');
  return{vegasPos,vegasColor,vegasScore,confirm,pos};
}

function renderSum(){
  const L=ALL.filter(c=>c.score>=58).length;
  const S=ALL.filter(c=>c.score<=42).length;
  const s5=ALL.filter(c=>c.score>=83).length;
  const alerts=ALL.filter(c=>c.alerts&&c.alerts.length>0).length;
  const surge=ALL.filter(c=>c.isSurge).length;
  const wlong=ALL.filter(c=>(+c.whaleLong||50)>=60&&c.hasLSData).length;
  const top=ALL[0];
  document.getElementById('sum').innerHTML=
    '<div class="sm g"><div class="sml">еҒҡеӨҡдҝЎиҷҹ</div><div class="smv cg">'+L+'</div><div class="sms">е…ұ'+ALL.length+'е№Ј</div></div>'+
    '<div class="sm r"><div class="sml">еҒҡз©әдҝЎиҷҹ</div><div class="smv cr">'+S+'</div><div class="sms">и§Җжңӣ'+(ALL.length-L-S)+'еҖӢ</div></div>'+

          '<div class="di"><div class="dl">зҸҫиІЁCVD</div><div class="dv '+(c.spotCVDDir==='иІ·'?'cg':c.spotCVDDir==='иіЈ'?'cr':'ca')+'">'+(c.spotCVDDir||'--')+'</div><div class="ds">'+(c.spotCVDDir===c.futCVDDir?'еҗҲзҙ„зҸҫиІЁдёҖиҮҙ':'ж–№еҗ‘дёҚдёҖиҮҙ')+'</div></div>'+
          '<div class="di"><div class="dl">жҲҗдәӨйҮҸ RVOL</div><div class="dv '+((+c.rvol>=2)?'ca':'')+'">'+((+c.rvol||1).toFixed(1))+'x</div><div class="ds">'+((+c.rvol>=3)?'з•°еёёж”ҫйҮҸ':( +c.rvol>=2)?'жҳҺйЎҜж”ҫйҮҸ':'жӯЈеёё')+'<br>жңҹзҸҫжҜ” '+((+c.futSpotVolRatio||0).toFixed(1))+'x</div></div>'+
        '</div></div>'+
      '</div></div>';
  }).join('');
}

function setTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curTab=t;
  apply();
}

function apply(){
  const q=document.getElementById('srch').value.toUpperCase().trim();
  let list=ALL.filter(c=>{
    if(q&&!c.sym.toUpperCase().includes(q))return false;
    if(curTab==='recent')return true;
    if(curTab==='vegas'){
      const v=getVegasSignal(c);
      return v.vegasScore!==0;
    }
    if(curTab==='s5')return c.score>=83;
    if(curTab==='s4')return c.score>=70&&c.score<83;
    if(curTab==='short')return c.score<=42;
    if(curTab==='alert')return c.alerts&&c.alerts.length>0;
    if(curTab==='independent')return(+c.relBTC||0)>5&&(+c.chg24h||0)>3&&(+c.oiChangePct1h||0)>3;
    if(curTab==='oia')return(+c.oiAnomalyCount||0)>=3;
    if(curTab==='surge')return c.isSurge;
    if(curTab==='frflip')return c.frFlip!==0;
    if(curTab==='rvol')return(+c.rvol||1)>=2;
    if(curTab==='expired')return c.signalExpired;
    if(curTab==='wlong')return(+c.whaleLong||50)>=60&&c.hasLSData;
    if(curTab==='wshort')return(+c.whaleLong||50)<=40&&c.hasLSData;
    return true;
  });
  // з¶ӯеҠ ж–Ҝ tab жҢүз¶ӯеҠ ж–Ҝи©•еҲҶжҺ’
  if(curTab==='vegas'){
    list.sort((a,b)=>{
      const av=getVegasSignal(a),bv=getVegasSignal(b);
      return Math.abs(bv.vegasScore)-Math.abs(av.vegasScore)||b.score-a.score;
    });
  } else if(curTab==='surge'){
    list.sort((a,b)=>b.chg24h-a.chg24h);
  } else if(curTab==='wlong'){
    list.sort((a,b)=>(+b.whaleLong||50)-(+a.whaleLong||50));
  } else if(curTab==='wshort'){
    list.sort((a,b)=>(+a.whaleLong||50)-(+b.whaleLong||50));
  } else if(curTab!=='recent'){
    list.sort((a,b)=>{
      const aP=(a.isOIBomb&&a.isSurge)?3:(a.isOIBomb||a.isSurge)?2:a.score>=83?1:0;
      const bP=(b.isOIBomb&&b.isSurge)?3:(b.isOIBomb||b.isSurge)?2:b.score>=83?1:0;
      if(aP!==bP)return bP-aP;
      return b.score-a.score;
    });
  }
  document.getElementById('lcnt').textContent=list.length+'еҖӢеҗҲзҙ„';
  renderList(list);
}

async function load(manual=false){
  const btn=document.querySelector('[onclick="load(true)"]');
  if(manual&&btn){btn.textContent='вҸі';btn.disabled=true;}
  const pill=document.getElementById('stpill');
  pill.className='lpill pload';pill.innerHTML='<span class="ldot"></span>Loading';
  try{
    const r=await fetch(API,{signal:AbortSignal.timeout(30000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!j.ok||!j.data?.length)throw new Error(j.msg||j.error||'no data');
    ALL=j.data;MKT=j.market||{};
    try{renderSum();}catch(e){console.error('renderSum error:',e);}
    try{apply();}catch(e){console.error('apply error:',e);}
    pill.className='lpill plive';
    pill.innerHTML='<span class="ldot"></span>LIVEВ·'+ALL.length;
    clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
  }catch(e){
    pill.className='lpill perr';pill.innerHTML='<span>вҡ </span> Error';
    document.getElementById('list').innerHTML='<div style="text-align:center;padding:30px"><div style="color:var(--r);font-size:10px;margin-bottom:10px">'+e.message+'</div><button onclick="load(true)" style="font-size:10px;padding:6px 14px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t0);cursor:pointer">Retry</button></div>';
    clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
  }finally{if(manual&&btn){btn.textContent='вҶ»';btn.disabled=false;}}
}
load();
</script></body></html>
