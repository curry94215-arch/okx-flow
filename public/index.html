<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#050608"><title>FLOW PRO</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');:root{--g:#00ff88;--g2:rgba(0,255,136,.08);--g3:rgba(0,255,136,.2);--r:#ff3366;--r2:rgba(255,51,102,.08);--r3:rgba(255,51,102,.2);--a:#ffb800;--a2:rgba(255,184,0,.08);--a3:rgba(255,184,0,.2);--pu:#a855f7;--pu2:rgba(168,85,247,.08);--bg0:#050608;--bg1:#090b0f;--bg2:#0d1117;--bg3:#111620;--bg4:#161c28;--b0:rgba(255,255,255,.04);--b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);--t0:#e6edf3;--t1:#8b949e;--t2:#484f58;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{background:var(--bg0);color:var(--t0);font-family:var(--sans);min-height:100dvh}::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--bg4)}.hdr{position:sticky;top:0;z-index:100;background:rgba(5,6,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b0);padding:0 12px;height:48px;display:flex;align-items:center;justify-content:space-between}.logo{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--t0)}.logo span{color:var(--g)}.hdr-r{display:flex;align-items:center;gap:6px}.lpill{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:3px;font-weight:600}.plive{background:var(--g2);color:var(--g);border:1px solid var(--g3)}.pload{background:var(--a2);color:var(--a);border:1px solid var(--a3)}.perr{background:var(--r2);color:var(--r);border:1px solid var(--r3)}.ldot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.htime{font-family:var(--mono);font-size:9px;color:var(--t2)}.hbtn{width:28px;height:28px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t1);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}.mkt{background:var(--bg1);border-bottom:1px solid var(--b0);padding:0 12px;height:32px;display:flex;align-items:center;gap:16px;overflow-x:auto}.mkt::-webkit-scrollbar{display:none}.mi{display:flex;align-items:center;gap:5px;flex-shrink:0}.mil{font-size:8px;color:var(--t2);letter-spacing:.04em;text-transform:uppercase}.miv{font-family:var(--mono);font-size:9px;font-weight:600}.msep{width:1px;height:14px;background:var(--b1);flex-shrink:0}.wrap{padding:10px 10px 65px;max-width:520px;margin:0 auto}.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}.sm{background:var(--bg2);border:1px solid var(--b0);border-radius:7px;padding:9px 10px;position:relative;overflow:hidden}.sm::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}.sm.g::after{background:linear-gradient(90deg,var(--g),transparent)}.sm.r::after{background:linear-gradient(90deg,var(--r),transparent)}.sm.a::after{background:linear-gradient(90deg,var(--a),transparent)}.sm.p::after{background:linear-gradient(90deg,var(--pu),transparent)}.sml{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}.smv{font-family:var(--mono);font-size:19px;font-weight:700;line-height:1;margin-bottom:2px}.sms{font-size:8px;color:var(--t2)}.cg{color:var(--g)}.cr{color:var(--r)}.ca{color:var(--a)}.cp{color:var(--pu)}.tabs{display:flex;gap:3px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px}.tabs::-webkit-scrollbar{display:none}.tab{font-size:9px;padding:4px 11px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s}.tab.on{background:var(--g);color:#001a0e;border-color:var(--g);font-weight:700}.tab.ron.on{background:var(--r);color:#fff;border-color:var(--r)}.srch-w{position:relative;margin-bottom:8px}.srchi{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--t2)}.srch{width:100%;padding:7px 9px 7px 28px;background:var(--bg2);border:1px solid var(--b0);border-radius:6px;color:var(--t0);font-size:11px;outline:none;font-family:var(--sans)}.srch:focus{border-color:rgba(0,255,136,.3)}.srch::placeholder{color:var(--t2)}.list{display:flex;flex-direction:column;gap:6px}.cc{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;overflow:hidden}.cc.long{border-left:3px solid var(--g)}.cc.short{border-left:3px solid var(--r)}.cc.hot{background:linear-gradient(135deg,var(--bg2) 80%,rgba(0,255,136,.03))}.alrt{padding:5px 11px;font-size:9px;font-weight:600;display:flex;align-items:center;gap:5px;letter-spacing:.01em}.alrt.danger{background:rgba(255,51,102,.1);color:#ff6688;border-bottom:1px solid rgba(255,51,102,.12)}.alrt.warning{background:rgba(255,184,0,.08);color:#ffc933;border-bottom:1px solid rgba(255,184,0,.12)}.alrt.success{background:rgba(0,255,136,.06);color:#33ffaa;border-bottom:1px solid rgba(0,255,136,.1)}.cb{padding:10px 11px}.r1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}.r1l{display:flex;align-items:center;gap:5px}.csym{font-size:17px;font-weight:700;letter-spacing:.01em}.badge{font-size:7px;padding:1px 5px;border-radius:2px;font-weight:700;letter-spacing:.03em}.hbadge{background:var(--g2);color:var(--g);border:1px solid var(--g3)}.obadge{background:var(--a2);color:var(--a);border:1px solid var(--a3)}.pr{text-align:right}.price{font-family:var(--mono);font-size:15px;font-weight:600}.pchg{font-family:var(--mono);font-size:10px;font-weight:500;margin-top:1px}.sig-row{margin-bottom:8px;padding:6px 8px;border-radius:6px;display:flex;align-items:center;justify-content:space-between}.sig-row.strong-long{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2)}.sig-row.mild-long{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.12)}.sig-row.watch-long{background:rgba(0,255,136,.03);border:1px solid rgba(0,255,136,.08)}.sig-row.neutral{background:var(--b0);border:1px solid var(--b1)}.sig-row.watch-short{background:rgba(255,51,102,.03);border:1px solid rgba(255,51,102,.08)}.sig-row.mild-short{background:rgba(255,51,102,.06);border:1px solid rgba(255,51,102,.12)}.sig-row.strong-short{background:rgba(255,51,102,.1);border:1px solid rgba(255,51,102,.2)}.sig-label{font-size:11px;font-weight:700;letter-spacing:.02em}.sig-meta{display:flex;align-items:center;gap:8px}.sig-time{font-family:var(--mono);font-size:8px;color:var(--t2)}.sig-score{font-family:var(--mono);font-size:22px;font-weight:700}.interp{font-size:9px;color:var(--t1);margin-bottom:8px;line-height:1.5;padding:5px 8px;background:var(--bg3);border-radius:5px}.dblock{background:var(--bg3);border-radius:7px;padding:8px 10px;margin-bottom:6px}.dblock-title{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}.ditem{display:flex;flex-direction:column;gap:2px}.dl{font-size:7px;color:var(--t2);letter-spacing:.03em}.dv{font-family:var(--mono);font-size:11px;font-weight:600}.ds{font-size:8px;color:var(--t1);margin-top:1px}.bar{width:100%;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin-top:3px}.bf{height:100%;border-radius:1px}.ratbar{display:flex;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px}.rbl{background:var(--g)}.rbs{background:var(--r)}.larea{text-align:center;padding:50px 16px}.lbar{width:160px;height:2px;background:var(--bg4);border-radius:1px;overflow:hidden;margin:12px auto}.lfill{height:100%;background:var(--g);animation:prog 1.6s ease-in-out infinite}@keyframes prog{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}.lmsg{font-size:10px;color:var(--t2);margin-top:8px}.sbar{position:fixed;bottom:0;left:0;right:0;background:rgba(5,6,8,.96);border-top:1px solid var(--b0);backdrop-filter:blur(12px);padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:8px;color:var(--t2)}</style></head><body>
<header class="hdr">
<div class="logo">FLOW <span>PRO</span></div>
<div class="hdr-r">
<span id="stpill" class="lpill pload"><span class="ldot"></span>連接中</span>
<span class="htime" id="clk">--:--</span>
<button class="hbtn" onclick="load(true)">↻</button>
</div>
</header>
<div class="mkt">
<div class="mi"><span class="mil">恐貪</span><span class="miv" id="fg">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">BTC 24H</span><span class="miv" id="btcchg">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">市場FR</span><span class="miv" id="avgfr">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">強烈信號</span><span class="miv" id="hotcnt">--</span></div>
<div class="msep"></div>
<div class="mi"><span class="mil">更新</span><span class="miv" id="lupd">--</span></div>
</div>
<div class="wrap">
<div class="sum" id="sum">
<div class="sm g"><div class="sml">載入中</div><div class="smv" style="color:var(--t2)">--</div></div>
<div class="sm r"><div class="sml">請稍候</div><div class="smv" style="color:var(--t2)">--</div></div>
<div class="sm a"><div class="sml">--</div><div class="smv" style="color:var(--t2)">--</div></div>
</div>
<div class="tabs">
<button class="tab on" onclick="setTab('all',this)">全部</button>
<button class="tab" onclick="setTab('s5',this)">🔴強烈做多</button>
<button class="tab" onclick="setTab('s4',this)">🟠偏多</button>
<button class="tab ron" onclick="setTab('short',this)">做空</button>
<button class="tab" onclick="setTab('alert',this)">⚠️警報</button>
<button class="tab" onclick="setTab('oia',this)">OI異常</button>
<button class="tab" onclick="setTab('frflip',this)">FR翻轉</button>
<button class="tab" onclick="setTab('rvol',this)">放量</button>
</div>
<div class="srch-w"><span class="srchi">🔍</span><input class="srch" id="srch" placeholder="搜尋幣種 BTC / ETH / DOGE..." oninput="apply()"></div>
<div class="list" id="list">
<div class="larea"><div style="font-size:20px">⬡</div><div class="lbar"><div class="lfill"></div></div><div class="lmsg">正在拉取即時數據...</div></div>
</div>
</div>
<div class="sbar"><span>幣安期貨 · 機構數據</span><span id="lcnt">--</span></div>
<script>
const API='https://okx-flow.jjm57hkpr6.workers.dev/api/coins';
let ALL=[],MKT={},curTab='all',autoT=null;
setInterval(()=>{const n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false})},1000);
const fp=p=>{if(!p||isNaN(p))return'--';const n=+p;if(n>10000)return'$'+n.toLocaleString('en',{maximumFractionDigits:0});if(n>1000)return'$'+n.toLocaleString('en',{maximumFractionDigits:1});if(n>100)return'$'+n.toFixed(2);if(n>10)return'$'+n.toFixed(3);if(n>1)return'$'+n.toFixed(4);if(n>0.01)return'$'+n.toFixed(5);return'$'+n.toFixed(7)};
const fc=c=>(+c>=0?'+':'')+parseFloat(c).toFixed(2)+'%';
const ffr=v=>{const p=(+v*100).toFixed(4);return(+p>=0?'+':'')+p+'%'};
const SC=s=>s>=82?'var(--g)':s>=68?'#44ddaa':s>=55?'var(--a)':s>=45?'var(--t1)':s>=32?'#ff9955':'var(--r)';
function renderSum(){
const L=ALL.filter(c=>c.score>=60).length;
const S=ALL.filter(c=>c.score<=40).length;
const s5=ALL.filter(c=>c.score>=82).length;
const alerts=ALL.filter(c=>c.alerts&&c.alerts.length>0).length;
const oiAnoms=ALL.filter(c=>(+c.oiAnomalyCount||0)>=3).length;
const top=ALL[0];
document.getElementById('sum').innerHTML=
'<div class="sm g"><div class="sml">做多信號</div><div class="smv cg">'+L+'</div><div class="sms">共'+ALL.length+'合約</div></div>'+
'<div class="sm r"><div class="sml">做空信號</div><div class="smv cr">'+S+'</div><div class="sms">觀望'+(ALL.length-L-S)+'個</div></div>'+
'<div class="sm a"><div class="sml">⚠️警報</div><div class="smv ca">'+alerts+'</div><div class="sms">需注意幣種</div></div>'+
'<div class="sm g"><div class="sml">🔴強烈做多</div><div class="smv cg">'+s5+'</div><div class="sms">評分≥82</div></div>'+
'<div class="sm a"><div class="sml">OI異常</div><div class="smv ca">'+oiAnoms+'</div><div class="sms">持倉異動</div></div>'+
'<div class="sm p"><div class="sml">今日最強</div><div class="smv cp" style="font-size:15px">'+(top?top.sym:'--')+'</div><div class="sms cg">'+(top?fc(top.chg24h):'--')+'</div></div>';
const fg=MKT.fearGreed||'--';
document.getElementById('fg').textContent=fg+' '+(MKT.fearGreedText||'');
document.getElementById('fg').style.color=fg>70?'var(--r)':fg<30?'var(--g)':'var(--a)';
document.getElementById('btcchg').textContent=(MKT.btcChg>=0?'+':'')+MKT.btcChg+'%';
document.getElementById('btcchg').style.color=MKT.btcChg>=0?'var(--g)':'var(--r)';
const avgFR=ALL.reduce((s,c)=>s+(+c.frVal||0),0)/(ALL.length||1);
document.getElementById('avgfr').textContent=ffr(avgFR);
document.getElementById('avgfr').style.color=avgFR>0?'var(--g)':'var(--r)';
document.getElementById('hotcnt').textContent=s5+'個';
document.getElementById('lupd').textContent=MKT.updateTime||'--';
}
function renderList(coins){
const el=document.getElementById('list');
if(!coins.length){el.innerHTML='<div style="text-align:center;padding:30px;font-size:10px;color:var(--t2)">沒有符合條件的合約</div>';return;}
el.innerHTML=coins.map(c=>{
const chg=+c.chg24h||0,fr=+c.frVal||0,wl=+c.whaleLong||50,rl=+c.retailLong||50;
const oi1h=+c.oiChangePct1h||0,oi4h=+c.oiChangePct4h||0,oi24h=+c.oiChangePct24h||0;
const sl=c.signalLevel||{label:'觀望',color:'neutral'};
const frBW=Math.min(100,Math.abs(fr/0.001)*100);
const alertsHtml=(c.alerts||[]).map(a=>'<div class="alrt '+a.level+'">'+a.msg+'</div>').join('');
const countdown=c.countdown>0?c.countdown+'分後結算':'--';
const sigColor=sl.color==='strong-long'?'var(--g)':sl.color==='mild-long'?'#44ddaa':sl.color==='watch-long'?'#88ffcc':sl.color==='strong-short'?'var(--r)':sl.color==='mild-short'?'#ff6688':sl.color==='watch-short'?'#ffaaaa':'var(--t1)';
return'<div class="cc '+(c.score>=60?'long':c.score<=40?'short':'')+' '+(c.isHot?'hot':'')+'">'+
alertsHtml+
'<div class="cb">'+
'<div class="r1">'+
'<div class="r1l"><span class="csym">'+c.sym+'</span>'+(c.isHot?'<span class="badge hbadge">HOT</span>':'')+((+c.oiAnomalyCount||0)>=3?'<span class="badge obadge">OI⚡</span>':'')+((c.frFlip)?'<span class="badge" style="background:rgba(0,255,136,.1);color:var(--g);border:1px solid var(--g3)">FR翻轉</span>':'')+((c.rvol||1)>2?'<span class="badge" style="background:rgba(255,184,0,.1);color:var(--a);border:1px solid var(--a3)">放量'+c.rvol+'x</span>':'')+'</div>'+
'<div class="pr"><div class="price">'+fp(c.price)+'</div><div class="pchg '+(chg>=0?'cg':'cr')+'">'+fc(chg)+'</div></div>'+
'</div>'+
'<div class="sig-row '+sl.color+'" style="color:'+sigColor+'">'+
'<span class="sig-label">'+sl.label+'</span>'+
'<div class="sig-meta"><span class="sig-time">'+c.signalTime+'</span><span class="sig-score" style="color:'+SC(c.score)+'">'+c.score+'</span></div>'+
'</div>'+
(c.interpretation?'<div class="interp">'+c.interpretation+'</div>':'')+
'<div class="dblock">'+
'<div class="dblock-title">📊 OI 持倉分析</div>'+
'<div class="dgrid">'+
'<div class="ditem"><div class="dl">1H 變化</div><div class="dv '+(oi1h>=0?'cg':'cr')+'">'+(oi1h>=0?'+':'')+oi1h.toFixed(2)+'%</div><div class="ds">'+c.oiTrend+'</div></div>'+
'<div class="ditem"><div class="dl">4H 變化</div><div class="dv '+(oi4h>=0?'cg':'cr')+'">'+(oi4h>=0?'+':'')+oi4h.toFixed(2)+'%</div></div>'+
'<div class="ditem"><div class="dl">24H 變化</div><div class="dv '+(oi24h>=0?'cg':'cr')+'">'+(oi24h>=0?'+':'')+oi24h.toFixed(2)+'%</div></div>'+
'<div class="ditem"><div class="dl">強度判斷</div><div class="dv" style="font-size:9px">'+（c.oiStrength||'--')+'</div></div>'+
'</div>'+
'</div>'+
'<div class="dblock">'+
'<div class="dblock-title">💰 資金費率</div>'+
'<div class="dgrid">'+
'<div class="ditem"><div class="dl">當前費率</div><div class="dv '+(fr>0?'cg':fr<0?'cr':'ca')+'">'+ffr(fr)+'</div><div class="ds">'+(fr>0.005?'多方付費':fr<-0.005?'空方付費':'費率中性')+'</div><div class="bar"><div class="bf" style="width:'+frBW+'%;background:'+(fr>0?'var(--g)':'var(--r)')+'"></div></div></div>'+
'<div class="ditem"><div class="dl">下次結算</div><div class="dv">'+c.nextFunding+'</div><div class="ds">'+countdown+'</div></div>'+
'</div>'+
'</div>'+
'<div class="dblock">'+
'<div class="dblock-title">🐋 主力動向</div>'+
'<div class="dgrid">'+
'<div class="ditem"><div class="dl">大戶多頭</div><div class="dv '+(wl>52?'cg':wl<48?'cr':'ca')+'">'+wl+'%</div><div class="ds">空頭 '+(100-wl)+'%</div><div class="ratbar"><div class="rbl" style="width:'+wl+'%"></div><div class="rbs" style="width:'+(100-wl)+'%"></div></div></div>'+
'<div class="ditem"><div class="dl">散戶多頭</div><div class="dv '+(rl<48?'cg':rl>52?'cr':'ca')+'">'+rl+'%</div><div class="ds">'+(rl<38?'反向做多機會':rl>62?'散戶追多謹慎':'均衡')+'</div></div>'+
'</div>'+
'</div>'+
'<div class="dblock">'+
'<div class="dblock-title">⚡ 買賣壓力</div>'+
'<div class="dgrid">'+
'<div class="ditem"><div class="dl">Taker 買壓</div><div class="dv '+(+c.taker>=52?'cg':+c.taker<=48?'cr':'ca')+'">'+(+c.taker||50)+'%</div><div class="ds">'+（c.takerTrend||'--')+'</div></div>'+
'<div class="ditem"><div class="dl">CVD 買賣差</div><div class="dv">'+（c.cvdText||'--')+'</div><div class="ds">相對BTC '+(+c.relBTC>=0?'+':'')+c.relBTC+'%</div></div>'+
'<div class="ditem"><div class="dl">成交量 RVOL</div><div class="dv '+(+c.rvol>=2?'ca':'')+'">'+（+c.rvol||1).toFixed(1)+'x</div><div class="ds">'+(+c.rvol>=3?'異常放量🔥':+c.rvol>=2?'明顯放量':'正常')+'</div></div>'+
'<div class="ditem"><div class="dl">訊號時間</div><div class="dv" style="font-size:10px">'+c.signalTime+'</div></div>'+
'</div>'+
'</div>'+
'</div></div>';
}).join('');
}
function setTab(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curTab=t;apply();}
function apply(){
const q=document.getElementById('srch').value.toUpperCase().trim();
let list=ALL.filter(c=>{
if(q&&!c.sym.toUpperCase().includes(q))return false;
if(curTab==='s5')return c.score>=82;
if(curTab==='s4')return c.score>=68&&c.score<82;
if(curTab==='short')return c.score<=40;
if(curTab==='alert')return c.alerts&&c.alerts.length>0;
if(curTab==='oia')return(+c.oiAnomalyCount||0)>=3;
if(curTab==='frflip')return c.frFlip;
if(curTab==='rvol')return(+c.rvol||1)>=2;
return true;
});
document.getElementById('lcnt').textContent=list.length+'個合約';
renderList(list);
}
async function load(manual=false){
const btn=document.querySelector('[onclick="load(true)"]');
if(manual&&btn){btn.textContent='⏳';btn.disabled=true;}
const pill=document.getElementById('stpill');
pill.className='lpill pload';pill.innerHTML='<span class="ldot"></span>更新中';
try{
const r=await fetch(API,{signal:AbortSignal.timeout(30000)});
if(!r.ok)throw new Error('HTTP '+r.status);
const j=await r.json();
if(!j.ok||!j.data?.length)throw new Error(j.msg||j.error||'no data');
ALL=j.data;MKT=j.market||{};
renderSum();apply();
pill.className='lpill plive';
pill.innerHTML='<span class="ldot"></span>LIVE·'+ALL.length;
clearTimeout(autoT);autoT=setTimeout(()=>load(),60000);
}catch(e){
pill.className='lpill perr';pill.innerHTML='⚠ 失敗';
document.getElementById('list').innerHTML='<div style="text-align:center;padding:30px"><div style="color:var(--r);font-size:10px;margin-bottom:10px">'+e.message+'</div><button onclick="load(true)" style="font-size:10px;padding:6px 14px;border:1px solid var(--b1);border-radius:4px;background:transparent;color:var(--t0);cursor:pointer">↻ 重試</button></div>';
clearTimeout(autoT);autoT=setTimeout(()=>load(),30000);
}finally{if(manual&&btn){btn.textContent='↻';btn.disabled=false;}}
}
load();
</script></body></html>
